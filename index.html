<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINAPACO KẾ TOÁN v32.0 - ĐỊNH DẠNG TẠM ỨNG CHUẨN TIỀN TỆ</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 11px; margin: 0; padding: 0; color: #1e293b; background: #f1f5f9; }
        .navbar { background: #0f172a; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .navbar h1 { margin: 0; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
        .btn-export { background: #10b981; color: white; border: none; padding: 6px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: all 0.2s; font-size: 11px; }
        .btn-export:hover { background: #059669; }
        .container { max-width: 100%; margin: 15px auto; padding: 0 15px; box-sizing: border-box; }
        .card { background: white; border-radius: 6px; border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 15px; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); }

        .tab-btn { padding: 8px 16px; font-weight: bold; border: 1px solid #e2e8f0; border-bottom: none; border-radius: 4px 4px 0 0; cursor: pointer; background: #f8fafc; color: #64748b; font-size: 11px; white-space: nowrap; }

        .tab-btn.active-nganhang { background: #7c3aed; color: white; border-color: #7c3aed; }
        
        .table-responsive { background: white; border: 1px solid #e2e8f0; border-radius: 0 6px 6px 6px; padding: 12px; overflow-x: auto; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); }

        .color-lcb { color: #1d4ed8; font-weight: bold; }
        .color-lcv { color: #c2410c; font-weight: bold; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">

            <h3 style="margin-top:0; color:#0f172a; font-size: 12px;">BƯỚC 1: NẠP FILE BẢNG THỐNG KÊ CHẤM CÔNG VÂN TAY GỐC THÁNG 6</h3>
            <div class="upload-zone" onclick="document.getElementById('excel-file-input').click()">

        <h3 style="color:#0f172a; font-size: 12px; margin-bottom: 6px;">BƯỚC 2: NHẬP LIỆU VÀ ĐIỀU HƯỚNG LIÊN TỤC</h3>
        <div class="tabs">
            <button onclick="switchTab('lcb')" id="tab-btn-lcb" class="tab-btn active-lcb">1. Phân Hệ Lương Cơ Bản (Thời Gian & Lễ Phép Gộp)</button>
            <button onclick="switchTab('lcv')" id="tab-btn-lcv" class="tab-btn">2. Phân Hệ Lương Công Việc (Thực Lĩnh CV & Tổng Lĩnh Cuối Cùng)</button>

            <button onclick="switchTab('nganhang')" id="tab-btn-nganhang" class="tab-btn">4. Tổng Hợp Chi Trả Ngân Hàng</button>
        </div>

        <div class="table-responsive">
            <table id="main-table">
                <thead id="table-head">
                    <tr style="background:#475569;">
                        <th style="padding: 25px; font-weight: 500; color: #cbd5e1; text-align: center;">Hệ thống đã sẵn sàng. Hãy nạp file ở Bước 1...</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
                <tfoot id="table-foot"></tfoot>
            </table>
        </div>
    </div>

    <script>
        const MASTER_STAFF_DIRECTORY = {
            "NGUYỄN MINH NGỌC":       { heSoCB: 1.94, phuCapCB: 0.25, luongKyHD: 9066600, hsHoanThanh: 1.0, heSoCV: 5.20, phuCapCV: 0.60, luongK3CV: 11009296, docHai: 0, tamUng: 5000000, pctt: 0, truUngT4: 0 },
            "NGUYỄN VĂN NAM":         { heSoCB: 1.48, phuCapCB: 0.00, luongKyHD: 6127200, hsHoanThanh: 1.0, heSoCV: 2.24, phuCapCV: 0.00, luongK3CV: 4220718, docHai: 0, tamUng: 4000000, pctt: 0, truUngT4: 0 },
            "NGUYỄN THỊ TUYẾT NHUNG": { heSoCB: 1.79, phuCapCB: 0.00, luongKyHD: 7410600, hsHoanThanh: 1.0, heSoCV: 1.74, phuCapCV: 0.00, luongK3CV: 3277717, docHai: 10, tamUng: 3000000, pctt: 0, truUngT4: 0 },
            "VŨ THỊ THU":             { heSoCB: 1.94, phuCapCB: 0.00, luongKyHD: 8031600, hsHoanThanh: 1.0, heSoCV: 1.86, phuCapCV: 0.00, luongK3CV: 3504021, docHai: 10, tamUng: 3000000, pctt: 0, truUngT4: 0 },
            "ĐÀO THỊ LIÊN":           { heSoCB: 1.79, phuCapCB: 0.00, luongKyHD: 7410600, hsHoanThanh: 1.0, heSoCV: 1.74, phuCapCV: 0.00, luongK3CV: 3277717, docHai: 10, tamUng: 4000000, pctt: 0, truUngT4: 0 },
            "VÕ THỊ THANH TUYỀN":     { heSoCB: 1.71, phuCapCB: 0.00, luongKyHD: 7079400, hsHoanThanh: 1.0, heSoCV: 1.74, phuCapCV: 0.00, luongK3CV: 3277717, docHai: 10, tamUng: 3000000, pctt: 0, truUngT4: 0 },
            "TRẦN THỊ THANH":         { heSoCB: 1.67, phuCapCB: 0.00, luongKyHD: 6913800, hsHoanThanh: 1.0, heSoCV: 1.48, phuCapCV: 0.00, luongK3CV: 2787848, docHai: 10, tamUng: 4000000, pctt: 0, truUngT4: 0 },
            "TRẦN ĐỨC CHIẾN":         { heSoCB: 1.83, phuCapCB: 0.00, luongKyHD: 7576200, hsHoanThanh: 1.0, heSoCV: 1.66, phuCapCV: 0.00, luongK3CV: 3127027, docHai: 0, tamUng: 3000000, pctt: 0, truUngT4: 0 },
            "PHẠM TIẾN LONG":         { heSoCB: 1.80, phuCapCB: 0.00, luongKyHD: 7452000, hsHoanThanh: 1.0, heSoCV: 1.62, phuCapCV: 0.00, luongK3CV: 3051700, docHai: 0, tamUng: 4000000, pctt: 0, truUngT4: 0 },
            "ĐINH HỮU VINH":          { heSoCB: 1.83, phuCapCB: 0.00, luongKyHD: 7576200, hsHoanThanh: 1.0, heSoCV: 1.66, phuCapCV: 0.00, luongK3CV: 3127027, docHai: 0, tamUng: 3000000, pctt: 0, truUngT4: 0 },
            "BÙI ĐÌNH ĐIỆP":          { heSoCB: 1.53, phuCapCB: 0.00, luongKyHD: 6334200, hsHoanThanh: 1.0, heSoCV: 1.62, phuCapCV: 0.00, luongK3CV: 3051700, docHai: 0, tamUng: 4000000, pctt: 0, truUngT4: 0 },
            "HOÀNG MẠNH HÙNG":        { heSoCB: 1.53, phuCapCB: 0.00, luongKyHD: 6334200, hsHoanThanh: 1.0, heSoCV: 1.62, phuCapCV: 0.00, luongK3CV: 3051700, docHai: 0, tamUng: 4000000, pctt: 0, truUngT4: 0 },
            "MA TRỌNG LUẬN":          { heSoCB: 1.35, phuCapCB: 0.00, luongKyHD: 5589000, hsHoanThanh: 1.1, heSoCV: 1.63, phuCapCV: 0.00, luongK3CV: 3070532, docHai: 18, tamUng: 3000000, pctt: 0, truUngT4: 0 },
            "TRẦN BÌNH DƯƠNG":        { heSoCB: 1.79, phuCapCB: 0.00, luongKyHD: 7410600, hsHoanThanh: 1.0, heSoCV: 2.40, phuCapCV: 0.00, luongK3CV: 4521037, docHai: 18, tamUng: 3000000, pctt: 0, truUngT4: 0 },
            "ĐẶNG TRẦN TRUNG":        { heSoCB: 1.53, phuCapCB: 0.00, luongKyHD: 6334200, hsHoanThanh: 1.0, heSoCV: 1.62, phuCapCV: 0.00, luongK3CV: 3051700, docHai: 0, tamUng: 3000000, pctt: 0, truUngT4: 0 },
            "PHẠM HUY CHIẾN":         { heSoCB: 2.26, phuCapCB: 0.00, luongKyHD: 9356400, hsHoanThanh: 1.0, heSoCV: 2.40, phuCapCV: 0.00, luongK3CV: 4521037, docHai: 0, tamUng: 4000000, pctt: 0, truUngT4: 0 },
            "NGUYỄN ĐỨC CHÍ":         { heSoCB: 1.53, phuCapCB: 0.00, luongKyHD: 6334200, hsHoanThanh: 1.0, heSoCV: 1.85, phuCapCV: 0.00, luongK3CV: 3485184, docHai: 0, tamUng: 0,       pctt: 0, truUngT4: 0 },
            "TRẦN THẠCH DƯƠNG":       { heSoCB: 1.53, phuCapCB: 0.00, luongKyHD: 6334200, hsHoanThanh: 1.0, heSoCV: 1.85, phuCapCV: 0.00, luongK3CV: 3485184, docHai: 0, tamUng: 0,       pctt: 0, truUngT4: 0 },
            "LÊ HỒNG PHƯƠNG":         { heSoCB: 1.53, phuCapCB: 0.00, luongKyHD: 6334200, hsHoanThanh: 1.0, heSoCV: 1.85, phuCapCV: 0.00, luongK3CV: 3485184, docHai: 0, tamUng: 0,       pctt: 0, truUngT4: 0 },
            "KHỔNG VĂN CHƯƠNG":       { heSoCB: 1.53, phuCapCB: 0.00, luongKyHD: 6334200, hsHoanThanh: 1.0, heSoCV: 1.85, phuCapCV: 0.00, luongK3CV: 3485184, docHai: 0, tamUng: 0,       pctt: 0, truUngT4: 0 }
        };

        let dynamicStaffDatabase = [];
        const baseLCB = 2530000;
        const dongGiaLCV = 2087970;
        let activeTab = 'lcb';

        function switchTab(tabName) {
            activeTab = tabName;
            ['lcb', 'lcv', 'anca', 'nganhang'].forEach(t => {
                const btn = document.getElementById('tab-btn-' + t);
                btn.className = 'tab-btn'; if (t === tabName) btn.classList.add('active-' + t);
            });
            renderTable();
        }

        function tinhToanToanBoLuong(staff) {
            let nCong = staff.cong;
            let nPhep = staff.phep;
            let nLe = staff.le;
            let hstt = staff.hsHoanThanh;

            // 1. PHÂN HỆ LƯƠNG CƠ BẢN
            let luongCoBanThang = baseLCB * (staff.heSoCB + staff.phuCapCB);
            let luongThoiGian = Math.round((luongCoBanThang / 22) * nCong);
            let luongLePhepThucTe = Math.round(staff.luongKyHD / 22) * (nPhep + nLe);
            let tongTienLCB = Math.round(luongThoiGian * hstt) + luongLePhepThucTe;

            let bhtn = staff.heSoCB > 0 ? Math.round(staff.luongKyHD * 0.01) : 0;
            let bhxh_yt = staff.heSoCB > 0 ? Math.round(staff.luongKyHD * 0.095) : 0;
            let thucLinhLCB = tongTienLCB - bhtn - bhxh_yt;

            // 2. PHÂN HỆ LƯƠNG CÔNG VIỆC
            let luongCongViecThang = (staff.heSoCV + staff.phuCapCV) * dongGiaLCV;
            let luongCV_ThucTe = Math.round((luongCongViecThang / 22) * nCong);
            let thucLinhLCV = luongCV_ThucTe - staff.tamUng - staff.pctt - staff.truUngT4;

            // 3. TỔNG THỰC LĨNH CB + CV CUỐI CÙNG
            let thucLinhTongCuoiCung = thucLinhLCV + thucLinhLCB;

            // 4. PHỤ CẤP ĂN CA & ĐỘC HẠI
            let anCa = staff.name.toUpperCase().includes("HOÀNG MẠNH HÙNG") ? 600000 : Math.round(nCong * 5000);
            let boiDuongDocHai = Math.round(staff.docHai * 13000);
            let tongThucNhanNganHang = thucLinhLCB + thucLinhLCV + anCa + boiDuongDocHai;

            return { 
                luongCoBanThang, luongThoiGian, luongLePhepThucTe, tongTienLCB, bhtn, bhxh_yt, thucLinhLCB, 
                luongCV_ThucTe, thucLinhLCV, thucLinhTongCuoiCung, anCa, boiDuongDocHai, tongThucNhanNganHang 
            };
        }

        function setupNavigationKeys() {
            document.querySelectorAll('.input-table').forEach(input => {
                input.onkeydown = function(e) {
                    let col = parseInt(this.getAttribute('data-col'));
                    let row = parseInt(this.getAttribute('data-row'));
                    let nextInput;

                    if (e.key === 'Enter' || e.key === 'ArrowDown') {
                        e.preventDefault();
                        nextInput = document.querySelector(`.input-table[data-col="${col}"][data-row="${row + 1}"]`);
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        nextInput = document.querySelector(`.input-table[data-col="${col}"][data-row="${row - 1}"]`);
                    } else if (e.key === 'ArrowRight') {
                        nextInput = document.querySelector(`.input-table[data-col="${col + 1}"][data-row="${row}"]`);
                    } else if (e.key === 'ArrowLeft') {
                        nextInput = document.querySelector(`.input-table[data-col="${col - 1}"][data-row="${row}"]`);
                    }

                    if (nextInput) {
                        nextInput.focus();
                        if(nextInput.tagName === "INPUT") nextInput.select();
                    }
                };
            });
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('upload-status').innerText = "Đang xử lý phân tích và định dạng dữ liệu...";
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
                    
                    let nameColIdx = 2;       
                    let targetCongColIdx = 34; 
                    let phépColIdx = 42;       
                    let lễColIdx = 44;         
                    let dataStartRowIdx = 7;   

                    for (let i = 0; i < Math.min(rows.length, 25); i++) {
                        let currentRow = rows[i];
                        if (!currentRow) continue;
                        for (let j = 0; j < currentRow.length; j++) {
                            let val = currentRow[j] ? currentRow[j].toString().trim().toUpperCase() : "";
                            if (val.includes("TÊN NHÂN VIÊN") || val === "HỌ VÀ TÊN" || val === "HỌ TÊN") {
                                nameColIdx = j;
                                dataStartRowIdx = i + 1;
                            }
                            if (val === "NT" && j > 20) targetCongColIdx = j;
                            if (val === "PHÉP") phépColIdx = j;
                            if (val === "LỄ") lễColIdx = j;
                        }
                    }

                    dynamicStaffDatabase = [];

                    for (let i = dataStartRowIdx; i < rows.length; i++) {
                        let row = rows[i];
                        if (!row || row.length <= nameColIdx) continue;

                        let rawName = row[nameColIdx] ? row[nameColIdx].toString().trim() : "";
                        let upperName = rawName.toUpperCase().replace(/\s+/g, ' ');

                        if (!rawName || /^\d+$/.test(rawName) || rawName.length <= 2 || upperName.includes("CỘNG") || upperName.includes("TOTAL")) continue;

                        let masterData = MASTER_STAFF_DIRECTORY[upperName];
                        if (!masterData) continue; 

                        let parsedCong = parseFloat(row[targetCongColIdx]?.toString().replace(/,/g, '.')) || 0;
                        let nPhep = parseFloat(row[phépColIdx]?.toString().replace(/,/g, '.')) || 0;
                        let nLe = parseFloat(row[lễColIdx]?.toString().replace(/,/g, '.')) || 0;

                        dynamicStaffDatabase.push({
                            name: upperName, cong: parsedCong, phep: nPhep, le: nLe,
                            heSoCB: masterData.heSoCB, phuCapCB: masterData.phuCapCB, luongKyHD: masterData.luongKyHD,
                            hsHoanThanh: masterData.hsHoanThanh, heSoCV: masterData.heSoCV, phuCapCV: masterData.phuCapCV, docHai: masterData.docHai,
                            tamUng: masterData.tamUng, pctt: masterData.pctt, truUngT4: masterData.truUngT4
                        });
                    }

                    document.getElementById('debug-status').style.display = "block";
                    document.getElementById('debug-status').innerHTML = `✅ Hệ thống đã áp dụng định dạng tiền tệ thông minh cho toàn bộ cột Tạm Ứng và Thực Lĩnh.`;
                    document.getElementById('upload-status').innerText = "Đã nạp và co giãn bảng dữ liệu thành công!";
                    renderTable();
                } catch(err) {
                    alert("Lỗi cấu trúc dữ liệu file chấm công: " + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // Định dạng số tiền tệ khi người dùng nhập xong tạm ứng
        function formatTamUngInput(input, index) {
            let val = input.value.replace(/[^0-9.-]/g, '');
            let parsedVal = parseFloat(val);
            if (isNaN(parsedVal) || parsedVal < 0) parsedVal = 0;
            
            dynamicStaffDatabase[index]['tamUng'] = parsedVal;
            
            // Cập nhật giao diện khi blur
            input.type = "text";
            input.value = parsedVal > 0 ? "-" + parsedVal.toLocaleString() : "0";

            const res = tinhToanToanBoLuong(dynamicStaffDatabase[index]);
            const rowElement = document.getElementById(`row-${index}`);
            if (rowElement && activeTab === 'lcv') {
                rowElement.querySelector('.td-luongcvtt').innerText = res.luongCV_ThucTe.toLocaleString();
                rowElement.querySelector('.td-thuckinhlcv').innerText = res.thucLinhLCV.toLocaleString();
                rowElement.querySelector('.td-thuckinhcbcv').innerText = res.thucLinhTongCuoiCung.toLocaleString();
            }
            updateTotalsFooter();
        }

        // Trả lại số nguyên khi người dùng click vào để sửa tạm ứng
        function unformatTamUngInput(input, index) {
            input.type = "number";
            input.value = dynamicStaffDatabase[index]['tamUng'];
            setTimeout(() => input.select(), 5);
        }

        function updateFieldHandmade(index, field, value) {
            let parsedVal = parseFloat(value);
            if (isNaN(parsedVal) || parsedVal < 0) parsedVal = 0;
            dynamicStaffDatabase[index][field] = parsedVal;
            
            const res = tinhToanToanBoLuong(dynamicStaffDatabase[index]);
            const rowElement = document.getElementById(`row-${index}`);
            if (rowElement) {
                if (activeTab === 'lcb') {
                    rowElement.querySelector('.td-luongtg').innerText = res.luongThoiGian.toLocaleString();
                    rowElement.querySelector('.td-luonglephat').innerText = res.luongLePhepThucTe.toLocaleString();
                    rowElement.querySelector('.td-tonglcb').innerText = res.tongTienLCB.toLocaleString();
                    rowElement.querySelector('.td-thuckinhlcb').innerText = res.thucLinhLCB.toLocaleString();
                }
            }
            updateTotalsFooter();
        }

        function updateTotalsFooter() {
            let tCong = 0, tPhep = 0, tLe = 0, tLuongTG = 0, tLePhepTien = 0, tTongTienLCB = 0, tThucLinhLCB = 0;
            let tLuongCVThuc = 0, tTamUng = 0, tPCTT = 0, tTruT4 = 0, tThucLinhLCV = 0, tThucLinhTongCBCV = 0;
            let tAnCa = 0, tDocHai = 0, tNganHang = 0;

            dynamicStaffDatabase.forEach(s => {
                const res = tinhToanToanBoLuong(s);
                tCong += s.cong; tPhep += s.phep; tLe += s.le; tLuongTG += res.luongThoiGian;
                tLePhepTien += res.luongLePhepThucTe; tTongTienLCB += res.tongTienLCB; tThucLinhLCB += res.thucLinhLCB;
                tLuongCVThuc += res.luongCV_ThucTe; tTamUng += s.tamUng; tPCTT += s.pctt; tTruT4 += s.truUngT4;
                tThucLinhLCV += res.thucLinhLCV; tThucLinhTongCBCV += res.thucLinhTongCuoiCung;
                tAnCa += res.anCa; tDocHai += res.boiDuongDocHai; tNganHang += res.tongThucNhanNganHang;
            });

            const foot = document.getElementById('table-foot');
            if (activeTab === 'lcb') {
                foot.innerHTML = `<tr style="background:#f1f5f9; font-weight:bold;"><td colspan="4" class="text-center">TỔNG CỘNG HỆ THỐNG</td><td class="text-center" style="color:#2563eb;">${tCong.toFixed(2)}</td><td>${tLuongTG.toLocaleString()}</td><td class="text-center">${tPhep.toFixed(1)}</td><td class="text-center">${tLe.toFixed(1)}</td><td>${tLePhepTien.toLocaleString()}</td><td colspan="1"></td><td>${tTongTienLCB.toLocaleString()}</td><td class="color-giamtru">-${tThucLinhLCB > 0 ? Math.round(tTongTienLCB*0.01).toLocaleString() : 0}</td><td class="color-giamtru">-${tThucLinhLCB > 0 ? Math.round(tTongTienLCB*0.095).toLocaleString() : 0}</td><td class="color-lcb">${tThucLinhLCB.toLocaleString()}</td></tr>`;
            } else if (activeTab === 'lcv') {
                foot.innerHTML = `<tr style="background:#f1f5f9; font-weight:bold;"><td colspan="3" class="text-center">TỔNG CỘNG HỆ THỐNG</td><td class="text-center">${tCong.toFixed(2)}</td><td>${tLuongCVThuc.toLocaleString()}</td><td class="color-giamtru">-${tTamUng.toLocaleString()}</td><td class="color-giamtru">-${tPCTT.toLocaleString()}</td><td class="color-giamtru">-${tTruT4.toLocaleString()}</td><td class="color-lcv">${tThucLinhLCV.toLocaleString()}</td><td class="color-tongcuoi" style="font-size:12px;">${tThucLinhTongCBCV.toLocaleString()}</td></tr>`;
            } else if (activeTab === 'anca') {
                foot.innerHTML = `<tr style="background:#f1f5f9; font-weight:bold;"><td colspan="2" class="text-center">TỔNG CỘNG HỆ THỐNG</td><td class="text-center">${tCong.toFixed(2)}</td><td></td><td>${tAnCa.toLocaleString()}</td><td></td><td style="color:#059669; font-size:12px;">${tDocHai.toLocaleString()}</td></tr>`;
            } else if (activeTab === 'nganhang') {
                foot.innerHTML = `<tr style="background:#f1f5f9; font-weight:bold;"><td colspan="2" class="text-center">TỔNG CỘNG HỆ THỐNG</td><td class="color-lcb">${tThucLinhLCB.toLocaleString()}</td><td class="color-lcv">${tThucLinhLCV.toLocaleString()}</td><td>${tAnCa.toLocaleString()}</td><td>${tDocHai.toLocaleString()}</td><td style="background:#f3e8ff; color:#6b21a8; font-size:13px;">${tNganHang.toLocaleString()}</td></tr>`;
            }
        }

        function renderTable() {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');

            if (dynamicStaffDatabase.length === 0) return;
            body.innerHTML = "";
            
            if (activeTab === 'lcb') {
                head.innerHTML = `<tr><th>STT</th><th class="text-left" style="min-width:140px;">Họ và Tên Nhân Sự</th><th>Hệ Số LCB</th><th>Mức Lương CB</th><th style="background:#2563eb;">Công NT</th><th>Lương Thời Gian</th><th style="background:#2563eb;">Phép</th><th style="background:#2563eb;">Lễ</th><th>Lương Lễ Phép</th><th>Hệ Số HT</th><th>Tổng Tiền LCB</th><th>BHTN (1%)</th><th>BHXH+BHYT</th><th style="background:#1e40af;">Thực Lĩnh LCB</th></tr>`;
            } else if (activeTab === 'lcv') {
                head.innerHTML = `<tr><th>STT</th><th class="text-left" style="min-width:140px;">Họ và Tên Nhân Sự</th><th>Hệ Số LCV</th><th style="background:#ea580c;">Ngày Công NT</th><th>Lương CV Thực Tế</th><th style="background:#dc2626; min-width:110px;">Tạm Ứng Trừ (-)</th><th style="background:#dc2626;">Quỹ PCTT (-)</th><th style="background:#dc2626;">Trừ Ứng T4 (-)</th><th style="background:#ca8a04;">Thực Lĩnh LCV</th><th style="background:#166534; font-size:11.5px;">Thực Lĩnh CB+CV Cuối Cùng</th></tr>`;
            } else if (activeTab === 'anca') {
                head.innerHTML = `<tr><th>STT</th><th class="text-left" style="min-width:140px;">Họ và Tên Nhân Sự</th><th style="background:#059669;">Ngày Công NT</th><th>Mức Ăn Ca</th><th>Tiền Ăn Ca Chi Trả</th><th>Công Độc Hại</th><th style="background:#065f46;">Bồi Dưỡng Độc Hại</th></tr>`;
            } else if (activeTab === 'nganhang') {
                head.innerHTML = `<tr><th>STT</th><th class="text-left" style="min-width:140px;">Họ và Tên Nhân Sự</th><th>Thực Lĩnh LCB (1)</th><th>Thực Lĩnh LCV (2)</th><th>Tiền Ăn Ca (3)</th><th>Độc Hại (4)</th><th style="background:#1e1b4b; color:#fde047; font-size:12px;">Thực Nhận Chuyển Khoản Ngân Hàng</th></tr>`;
            }

            dynamicStaffDatabase.forEach((staff, index) => {
                const res = tinhToanToanBoLuong(staff);
                
                let oCong = `<input type="number" step="0.01" value="${staff.cong}" data-col="1" data-row="${index}" oninput="updateFieldHandmade(${index}, 'cong', this.value)" class="input-table input-cong">`;
                let oPhep = `<input type="number" step="0.5" value="${staff.phep}" data-col="2" data-row="${index}" oninput="updateFieldHandmade(${index}, 'phep', this.value)" class="input-table input-cong">`;
                let oLe = `<input type="number" step="0.5" value="${staff.le}" data-col="3" data-row="${index}" oninput="updateFieldHandmade(${index}, 'le', this.value)" class="input-table input-cong">`;
                let oHT = `<input type="number" step="0.1" value="${staff.hsHoanThanh}" data-col="4" data-row="${index}" oninput="updateFieldHandmade(${index}, 'hsHoanThanh', this.value)" class="input-table">`;
                
                // Ô nhập liệu tạm ứng động hiển thị dạng chuỗi phân tách tiền tệ rõ ràng
                let hienThiTamUng = staff.tamUng > 0 ? "-" + staff.tamUng.toLocaleString() : "0";
                let oTamUng = `<input type="text" value="${hienThiTamUng}" data-col="5" data-row="${index}" onfocus="unformatTamUngInput(this, ${index})" onblur="formatTamUngInput(this, ${index})" class="input-table input-tamung">`;

                let rowHtml = `<tr id="row-${index}">`;
                if (activeTab === 'lcb') {
                    rowHtml += `<td class="text-center">${index + 1}</td><td class="text-left font-bold" style="color:#0f172a;">${staff.name}</td><td>${(staff.heSoCB+staff.phuCapCB).toFixed(2)}</td><td>${res.luongCoBanThang.toLocaleString()}</td><td class="text-center" style="padding:1px;">${oCong}</td><td class="td-luongtg">${res.luongThoiGian.toLocaleString()}</td><td class="text-center" style="padding:1px;">${oPhep}</td><td class="text-center" style="padding:1px;">${oLe}</td><td class="td-luonglephat" style="font-weight:600;">${res.luongLePhepThucTe.toLocaleString()}</td><td class="text-center" style="padding:1px;">${oHT}</td><td class="font-bold td-tonglcb" style="color:#b45309; background:#fffbeb;">${res.tongTienLCB.toLocaleString()}</td><td class="color-giamtru">-${res.bhtn.toLocaleString()}</td><td class="color-giamtru">-${res.bhxh_yt.toLocaleString()}</td><td class="color-lcb td-thuckinhlcb">${res.thucLinhLCB.toLocaleString()}</td>`;
                } else if (activeTab === 'lcv') {
                    rowHtml += `<td class="text-center">${index + 1}</td><td class="text-left font-bold" style="color:#0f172a;">${staff.name}</td><td class="text-center font-bold">${(staff.heSoCV+staff.phuCapCV).toFixed(2)}</td><td class="text-center" style="padding:1px;">${oCong}</td><td class="td-luongcvtt">${res.luongCV_ThucTe.toLocaleString()}</td><td style="padding:1px; text-align:center;">${oTamUng}</td><td class="color-giamtru">${staff.pctt > 0 ? '-' + staff.pctt.toLocaleString() : '-'}</td><td class="color-giamtru">${staff.truUngT4 > 0 ? '-' + staff.truUngT4.toLocaleString() : '-'}</td><td class="color-lcv td-thuckinhlcv">${res.thucLinhLCV.toLocaleString()}</td><td class="color-tongcuoi td-thuckinhcbcv">${res.thucLinhTongCuoiCung.toLocaleString()}</td>`;
                } else if (activeTab === 'anca') {
                    let mucAnCa = staff.name.includes("HOÀNG MẠNH HÙNG") ? "Khoán" : "5.000đ/ngày";
                    rowHtml += `<td class="text-center">${index + 1}</td><td class="text-left font-bold" style="color:#0f172a;">${staff.name}</td><td class="text-center" style="padding:1px;">${oCong}</td><td class="text-center">${mucAnCa}</td><td class="td-tiencan">${res.anCa.toLocaleString()}</td><td class="text-center font-bold">${staff.docHai}</td><td class="font-bold td-tiendochai" style="background:#f0fdf4; color:#059669;">${res.boiDuongDocHai.toLocaleString()}</td>`;
                } else if (activeTab === 'nganhang') {
                    rowHtml += `<td class="text-center">${index + 1}</td><td class="text-left font-bold" style="color:#1e1b4b;">${staff.name}</td><td class="color-lcb">${res.thucLinhLCB.toLocaleString()}</td><td class="color-lcv">${res.thucLinhLCV.toLocaleString()}</td><td>${res.anCa.toLocaleString()}</td><td>${res.boiDuongDocHai.toLocaleString()}</td><td class="font-bold" style="background:#f5f3ff; color:#7c3aed; font-size:12px;">${res.tongThucNhanNganHang.toLocaleString()}</td>`;
                }
                rowHtml += `</tr>`;
                body.innerHTML += rowHtml;
            });

            updateTotalsFooter();
            setupNavigationKeys();
        }

        function exportCleanExcel() {
            if (dynamicStaffDatabase.length === 0) return alert("Không có dữ liệu để xuất!");
            let dataForExcel = [["STT", "Họ và Tên", "Ngày Công NT", "Phép", "Lễ", "Lương Lễ Phép Thực Tế", "Tạm Ứng Trừ", "Thực Lĩnh Cơ Bản", "Thực Lĩnh Công Việc", "Thực Lĩnh CB+CV Cuối Cùng", "Tiền Ăn Ca", "Độc Hại", "Tổng Thực Nhận Chuyển Khoản Ngân Hàng"]];
            dynamicStaffDatabase.forEach((s, idx) => {
                const res = tinhToanToanBoLuong(s);
                dataForExcel.push([idx + 1, s.name, s.cong, s.phep, s.le, res.luongLePhepThucTe, s.tamUng, res.thucLinhLCB, res.thucLinhLCV, res.thucLinhTongCuoiCung, res.anCa, res.boiDuongDocHai, res.tongThucNhanNganHang]);
            });
            const ws = XLSX.utils.aoa_to_sheet(dataForExcel);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Bảng_Lương_Tổng_Hợp");
            XLSX.writeFile(wb, "Bang_Luong_Vinapaco_v32.xlsx");
        }
    </script>
</body>
</html>
