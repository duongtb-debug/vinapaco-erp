<script>
// ==========================================================================
// ĐOẠN CODE HOÀN CHỈNH SỬA LỖI 404 KHÔNG ĐỌC ĐƯỢC FILE ĐỈNH KÈM
// ==========================================================================

// Hàm xử lý khi bấm nút "Lưu cập nhật" trên giao diện VINAPACO
async function xuLyCapNhatHoSo(idHoSo, thongTinMoi, fileMinhChungMoi) {
    try {
        // Mặc định: giữ lại link file cũ nếu người dùng không chọn file mới
        let linkMinhChungFinal = thongTinMoi.link_minh_chung_cu; 

        // 1. NẾU NGƯỜI DÙNG CÓ CHỌN FILE MỚI -> TIẾN HÀNH TẢI LÊN
        if (fileMinhChungMoi) {
            
            // 1.1. Lấy đuôi file gốc (.pdf, .png, .jpg...) để tránh bị mất định dạng gây lỗi 404
            const tenFileGoc = fileMinhChungMoi.name;
            const viTriDauCham = tenFileGoc.lastIndexOf('.');
            const duoiFile = viTriDauCham !== -1 ? tenFileGoc.slice(viTriDauCham) : '.pdf'; // Mặc định .pdf nếu lỗi
            
            // 1.2. Tạo tên file chuẩn chứa đầy đủ cả phần đuôi tệp
            const maHoSo = thongTinMoi.ma_ho_so || 'HS-' + Date.now();
            const tenFileStorage = `${maHoSo}${duoiFile}`;

            // 1.3. Đẩy file lên Supabase Storage với cấu hình "upsert: true" để ghi đè file cũ
            const { data: uploadData, error: uploadError } = await supabase.storage
                .from('chung_tu_thanh_toan')
                .upload(tenFileStorage, fileMinhChungMoi, { 
                    upsert: true // CHỐNG LỖI 404: Cho phép lưu đè lên file cũ mà không bị chặn quyền
                });

            if (uploadError) {
                throw new Error("Lỗi tải file lên Storage: " + uploadError.message);
            }

            // 1.4. Lấy lại đường link Public URL chuẩn mới sau khi đã lưu đè thành công
            const { data: urlData } = supabase.storage
                .from('chung_tu_thanh_toan')
                .getPublicUrl(tenFileStorage);
                
            linkMinhChungFinal = urlData.publicUrl;
        }

        // 2. CẬP NHẬT ĐƯỜNG LINK FILE MỚI VÀO DATABASE
        const { error: dbError } = await supabase
            .from('ho_so_thanh_toan') // Hãy đảm bảo tên bảng này trùng với tên bảng Database của bạn
            .update({
                ten_ho_so: thongTinMoi.ten_ho_so,
                tong_tien: thongTinMoi.tong_tien,
                link_minh_chung: linkMinhChungFinal, // Lưu link chuẩn đầy đủ đuôi vào đây
                ngay_cap_nhat: new Date().toISOString()
            })
            .eq('id', idHoSo); // Tìm đúng dòng hồ sơ đang sửa theo ID

        if (dbError) {
            throw new Error("Lỗi lưu Cơ sở dữ liệu: " + dbError.message);
        }

        // 3. THÔNG BÁO THÀNH CÔNG
        alert("Hệ thống VINAPACO đã cập nhật hồ sơ chứng từ thành công!");
        location.reload(); // Tải lại trang để bảng dữ liệu cập nhật mới luôn

    } catch (error) {
        console.error("Quá trình sửa thất bại:", error);
        alert("Đã xảy ra lỗi: " + error.message);
    }
}

// ==========================================================================
// ĐOẠN KÍCH HOẠT SỰ KIỆN NÚT BẤM LƯU TRÊN FORM CỦA BẠN
// ==========================================================================
const nutLuuCapNhat = document.getElementById('ID_NUT_LUU'); // Thay 'ID_NUT_LUU' bằng ID nút của bạn nếu khác
if (nutLuuCapNhat) {
    nutLuuCapNhat.addEventListener('click', async () => {
        // Lấy ID hồ sơ hiện tại và file mới chọn từ giao diện HTML của bạn
        const idHoSo = document.getElementById('ID_INPUT_ID_HO_SO').value; 
        const fileMoi = document.getElementById('ID_INPUT_FILE').files[0]; 

        const thongTinMoi = {
            ten_ho_so: document.getElementById('ID_INPUT_TEN').value,
            tong_tien: document.getElementById('ID_INPUT_TIEN').value,
            ma_ho_so: 'HS-1781591990029', // Mã hồ sơ hiện tại dùng làm tên file
            link_minh_chung_cu: 'LINK_CU_LAY_TU_DATABASE_NEU_CO' 
        };

        // Chạy hàm cập nhật sửa lỗi
        await xuLyCapNhatHoSo(idHoSo, thongTinMoi, fileMoi);
    });
}
</script>
