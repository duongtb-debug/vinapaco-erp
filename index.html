<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinapaco ERP - Quản Trị Hệ Thống Chuyên Gia v8</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
            --border-color: #e2e8f0;
            --row-even: #f8fafc;
            --row-hover: #f1f5f9;
            --row-focus: #e0f2fe;
            --status-success: #10b981;
            --status-error: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Layout */
        #sidebar { width: 280px; background-color: var(--primary-color); color: white; padding: 20px 12px; display: flex; flex-direction: column; justify-content: space-between; }
        .logo { font-size: 18px; font-weight: bold; text-align: center; padding: 10px 0 15px 0; border-bottom: 1px solid #334155; color: #f8fafc; letter-spacing: 1px; }
        .nav-menu { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; flex: 1; }
        .nav-btn { padding: 12px 15px; border: none; background: none; color: #94a3b8; text-align: left; font-size: 14px; cursor: pointer; border-radius: 6px; transition: 0.2s; }
        .nav-btn:hover, .nav-btn.active { background-color: var(--accent-color); color: white; }

        .sidebar-calendar-widget {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        .widget-clock { font-size: 20px; font-weight: bold; color: #38bdf8; margin-bottom: 8px; font-family: monospace; }
        .widget-date-dl { font-size: 13px; color: #f8fafc; opacity: 0.9; margin-bottom: 8px; }
        .widget-date-al { font-size: 18px; font-weight: bold; color: #fbbf24; margin-bottom: 4px; }

        /* Main Content */
        #main-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #topbar { height: 60px; background-color: var(--card-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        #content-area { flex: 1; padding: 30px; overflow-y: auto; }

        /* Supabase Status Badge */
        .db-status-container { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; background: #f1f5f9; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border-color); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; background-color: #64748b; animation: pulse 2s infinite; }
        .status-dot.connected { background-color: var(--status-success); box-shadow: 0 0 8px var(--status-success); }
        .status-dot.disconnected { background-color: var(--status-error); box-shadow: 0 0 8px var(--status-error); }

        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; margin-bottom: 25px; }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; color: #1e293b; border-left: 4px solid var(--accent-color); padding-left: 10px; }
        
        .upload-zone { border: 2px dashed #cbd5e1; padding: 20px; text-align: center; border-radius: 8px; background-color: #f8fafc; cursor: pointer; }
        .upload-zone:hover { border-color: var(--accent-color); background-color: #eff6ff; }
        .grid-flex { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .form-group { margin-bottom: 15px; display: inline-block; margin-right: 15px; }
        label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; color: #64748b; }
        select, input, button { padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px; outline: none; }
        button { background-color: var(--accent-color); color: white; border: none; cursor: pointer; font-weight: 500; }

        /* Table Style & Badges */
        .table-responsive { width: 100%; overflow-x: auto; border: 1px solid var(--border-color); border-radius: 6px; background-color: white; max-height: 520px; }
        table { width: 100%; border-collapse: collapse; text-align: left; white-space: nowrap; }
        th, td { padding: 12px 18px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        th { background-color: #f1f5f9; color: #475569; font-weight: 600; position: sticky; top: 0; z-index: 10; }
        
        tbody tr:nth-child(even) { background-color: var(--row-even); }
        tbody tr:hover { background-color: var(--row-hover); cursor: pointer; }
        tbody tr.focused-row { background-color: var(--row-focus) !important; border-left: 4px solid var(--accent-color); }
        
        .badge-atv { background: #f0fdf4; color: #16a34a; padding: 4px 8px; border-radius: 4px; font-weight: 600; border: 1px solid #bbf7d0; }
        .badge-dh { background: #fff7ed; color: #ea580c; padding: 4px 8px; border-radius: 4px; font-weight: 600; border: 1px solid #ffedd5; }
        .badge-age { background: #fef9c3; color: #713f12; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
        .btn-edit-row { background-color: #f1f5f9; color: #334155; border: 1px solid #cbd5e1; padding: 4px 8px; font-size: 12px; border-radius: 4px; transition: 0.2s; }
        .btn-edit-row:hover { background-color: var(--accent-color); color: white; }

        /* Modal Popup */
        #edit-modal-backdrop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 520px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .modal-actions { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }

        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="sidebar">
        <div>
            <div class="logo">VINAPACO ERP v8</div>
            <div class="nav-menu">
                <button class="nav-btn active" onclick="switchTab('nhansu')">👥 Nhân Sự Gốc (Excel)</button>
                <button class="nav-btn" onclick="switchTab('nghiepvu')">💼 Phân Hệ Nghiệp Vụ</button>
            </div>
        </div>
        <div class="sidebar-calendar-widget">
            <div id="live-clock" class="widget-clock">00:00:00</div>
            <div id="date-duong" class="widget-date-dl">Đang tải...</div>
            <div id="date-am" class="widget-date-al">Ngày 24 / 05 Âm Lịch</div>
        </div>
    </div>

    <div id="main-view">
        <div id="topbar">
            <h2 id="view-title">Hệ Thống Quản Lý Nhân Sự Gốc</h2>
            <div class="db-status-container">
                <span id="supabase-dot" class="status-dot"></span>
                <span id="supabase-text">Đang kết nối...</span>
            </div>
        </div>
        
        <div id="content-area">
            <div id="tab-nhansu" class="tab-content">
                <div class="card">
                    <div class="card-title">Nhập danh sách trực tiếp từ Excel</div>
                    <div class="upload-zone" onclick="document.getElementById('excel-file-input').click()">
                        <p style="font-size: 14px; color: #64748b;">📍 Bấm để nạp hoặc kéo thả file Excel Nhân sự Vinapaco</p>
                        <input type="file" id="excel-file-input" accept=".xlsx, .xls" style="display:none;" onchange="handleExcelImport(event)">
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">🔍 Bộ lọc nhanh</div>
                    <div class="grid-flex">
                        <div class="form-group">
                            <label>Tìm kiếm thông minh</label>
                            <input type="text" id="filter-search-global" placeholder="Nhập tên, số CCCD..." oninput="applyAdvancedFilters()">
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title" id="table-status">Bảng dữ liệu Excel (Trống)</div>
                    <div class="table-responsive">
                        <table id="dynamic-excel-table">
                            <thead><tr><th style="text-align: center;">Chưa có dữ liệu.</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-modal-backdrop">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px; font-size: 16px;">✏️ Cập nhật & Sửa lỗi định dạng</h3>
            <input type="hidden" id="edit-index">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group" style="width:100%;">
                    <label>Họ và Tên</label>
                    <input type="text" id="edit-hoten" style="width:100%;">
                </div>
                <div class="form-group" style="width:100%;">
                    <label>Ngày/Năm sinh (Gốc)</label>
                    <input type="text" id="edit-ngaysinh" placeholder="VD: 25425 hoặc DD/MM/YYYY" style="width:100%;">
                </div>
                <div class="form-group" style="width:100%;">
                    <label>Số sổ BHXH</label>
                    <input type="text" id="edit-bhxh" style="width:100%;">
                </div>
                <div class="form-group" style="width:100%;">
                    <label>Số CCCD</label>
                    <input type="text" id="edit-cccd" style="width:100%;">
                </div>
                <div class="form-group" style="width:100%;">
                    <label>Năm về hưu (Gốc)</label>
                    <input type="text" id="edit-vehưu" placeholder="VD: 46266 hoặc DD/MM/YYYY" style="width:100%;">
                </div>
                <div class="form-group" style="width:100%;">
                    <label>Hưu luật mới</label>
                    <input type="text" id="edit-huuluat" style="width:100%;">
                </div>
                <div class="form-group" style="width:100%;">
                    <label>An toàn viên gốc</label>
                    <input type="text" id="edit-atv" style="width:100%;">
                </div>
                <div class="form-group" style="width:100%;">
                    <label>NNĐH gốc</label>
                    <input type="text" id="edit-nndh" style="width:100%;">
                </div>
            </div>
            <div class="form-group" style="width:100%; margin-top: 10px;">
                <label>Chức danh công việc</label>
                <input type="text" id="edit-chucdanh" style="width:100%;">
            </div>

            <div class="modal-actions">
                <button onclick="closeEditModal()" style="background-color: #64748b;">Hủy</button>
                <button onclick="saveRowCalculations()" style="background-color: var(--accent-color);">Lưu & Cập Nhật Tự Động</button>
            </div>
        </div>
    </div>

    <script>
        const SUBABASE_URL = "https://mtfpxsfxjsnghtalamdd.supabase.co";
        const SUPABASE_KEY = "sb_publishable_F9qfNlAUikQ-9pYHV8jL8g_xrBa8s5w";
        let _supabase = null;
        let localExcelData = []; 

        const CUSTOM_FINAL_HEADERS = [
            "Thao tác", "Stt", "Họ và Tên", "Tên", "Năm sinh", "Năm", "Tuổi hiện tại", 
            "Số sổ bảo hiểm", "Số căn cước công dân", "Năm về hưu", "Hưu luật mới", 
            "An toàn viên", "NNĐH", "Chức danh công việc"
        ];

        function checkSupabaseConnection() {
            const dot = document.getElementById('supabase-dot');
            const text = document.getElementById('supabase-text');
            try {
                _supabase = supabase.createClient(SUBABASE_URL, SUPABASE_KEY);
                if(_supabase) {
                    dot.className = "status-dot connected";
                    text.innerText = "Supabase: Đã Kết Nối";
                    text.style.color = "var(--status-success)";
                }
            } catch (err) {
                dot.className = "status-dot disconnected";
                text.innerText = "Supabase: Mất Kết Nối";
                text.style.color = "var(--status-error)";
            }
        }

        // --- BỘ MÁY ĐỊNH DẠNG VÀ PHỤC HỒI DỮ LIỆU EXCEL SERIAL HỢP NHẤT ---
        function normalizeDate(val) {
            if (!val || val === "—" || val === "") return "—";
            
            // Xử lý nếu giá trị đầu vào là chuỗi nhưng bản chất là số thuần (ví dụ nhập tay "46266")
            let num = Number(val);
            if (!isNaN(num) && typeof val === 'string' && val.trim() !== "") {
                val = num;
            }

            if (typeof val === 'number') {
                const date = new Date((val - 25569) * 86400 * 1000);
                if (isNaN(date.getTime())) return val; 
                const dd = String(date.getDate()).padStart(2, '0');
                const mm = String(date.getMonth() + 1).padStart(2, '0');
                const yyyy = date.getFullYear();
                return `${dd}/${mm}/${yyyy}`;
            }

            // Nếu là chuỗi ngày tháng chuẩn Việt Nam hoặc chuỗi văn bản (ví dụ: "Tháng 08/2032")
            return val.toString().trim();
        }

        function normalizeYear(val) {
            if (!val || val === "—" || val === "") return "—";
            
            let num = Number(val);
            if (!isNaN(num)) {
                // Nếu là mã Excel Serial (VD: 5425 hoặc 25425)
                if (num > 1000) {
                    const date = new Date((num - 25569) * 86400 * 1000);
                    return isNaN(date.getTime()) ? val.toString() : date.getFullYear().toString();
                }
                return num.toString();
            }

            if (typeof val === 'string' && val.includes('/')) {
                const parts = val.split('/');
                return parts[parts.length - 1]; 
            }
            return val.toString();
        }

        // HÀM TÍNH TOÁN CORE - TỰ ĐỘNG KHẮC PHỤC LỖI KHI CÓ THAY ĐỔI DỮ LIỆU
        function calculateRowDependencies(row, index) {
            // Chuẩn hóa định dạng trước khi xử lý logic
            row["Năm sinh"] = normalizeDate(row["Năm sinh"]);
            row["Năm về hưu"] = normalizeDate(row["Năm về hưu"]);
            row["Hưu luật mới"] = normalizeDate(row["Hưu luật mới"]);

            // 1. Tách tên tự động
            if (row["Họ và Tên"] && row["Họ và Tên"] !== "—") {
                const parts = row["Họ và Tên"].trim().split(/\s+/);
                row["Tên"] = parts[parts.length - 1];
            }

            // 2. Ép định dạng Năm gốc
            row["Năm"] = normalizeYear(row["Năm sinh"] !== "—" ? row["Năm sinh"] : row["Năm"]);

            // 3. Tính Tuổi hiện tại dựa trên mốc thời gian cố định 2026
            if (row["Năm"] !== "—" && !isNaN(parseInt(row["Năm"]))) {
                row["Tuổi hiện tại"] = 2026 - parseInt(row["Năm"]);
            } else {
                row["Tuổi hiện tại"] = "—";
            }

            return row;
        }

        function handleExcelImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const rawJson = XLSX.utils.sheet_to_json(worksheet, { defval: "—" });
                
                localExcelData = rawJson.map((row, idx) => {
                    const findVal = (kws) => {
                        const key = Object.keys(row).find(k => kws.some(kw => k.toLowerCase().replace(/\s+/g, '').includes(kw.toLowerCase().replace(/\s+/g, ''))));
                        return key ? row[key] : "—";
                    };

                    let item = {
                        "Stt": findVal(["stt", "thứ tự"]),
                        "Họ và Tên": findVal(["họ và tên", "hoten"]),
                        "Tên": "—",
                        "Năm sinh": findVal(["ngày sinh", "ngaysinh", "năm sinh"]),
                        "Năm": "—",
                        "Tuổi hiện tại": "—",
                        "Số sổ bảo hiểm": findVal(["số sổ bhxh", "bảo hiểm", "bhxh"]),
                        "Số căn cước công dân": findVal(["số cccd", "cccd", "căn cước"]),
                        "Năm về hưu": findVal(["ngày về hưu gốc", "về hưu gốc", "năm về hưu"]),
                        "Hưu luật mới": findVal(["hưu luật mới", "luật mới"]),
                        "An toàn viên": findVal(["an toàn viên", "atv"]),
                        "NNĐH": findVal(["độc hại", "nnđh"]),
                        "Chức danh công việc": findVal(["chức danh", "chức vụ", "công việc"])
                    };
                    return calculateRowDependencies(item, idx);
                });
                renderOrderedTable(localExcelData);
            };
            reader.readAsArrayBuffer(file);
        }

        function renderOrderedTable(dataArray) {
            const table = document.getElementById('dynamic-excel-table');
            table.innerHTML = "";
            if(dataArray.length === 0) return;

            const thead = document.createElement('thead');
            const hr = document.createElement('tr');
            CUSTOM_FINAL_HEADERS.forEach(h => { const th = document.createElement('th'); th.innerText = h; hr.appendChild(th); });
            thead.appendChild(hr);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            dataArray.forEach((row, index) => {
                const tr = document.createElement('tr');
                CUSTOM_FINAL_HEADERS.forEach(header => {
                    const td = document.createElement('td');
                    if(header === "Thao tác") {
                        td.innerHTML = `<button class="btn-edit-row" onclick="openEditModal(${index})">Sửa</button>`;
                    } else if(header === "An toàn viên") {
                        td.innerHTML = (row[header] && row[header] !== "—" && row[header] !== "") ? `<span class="badge-atv">ATV (${row[header]})</span>` : "—";
                    } else if(header === "NNĐH") {
                        td.innerHTML = (row[header] && row[header] !== "—" && row[header] !== "") ? `<span class="badge-dh">Độc hại (${row[header]})</span>` : "—";
                    } else if(header === "Tuổi hiện tại" && row[header] !== "—") {
                        td.innerHTML = `<span class="badge-age">${row[header]}</span>`;
                    } else if(header === "Họ và Tên") {
                        td.innerHTML = `<b style="color:var(--accent-color);">${row[header]}</b>`;
                    } else {
                        td.innerText = row[header];
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            document.getElementById('table-status').innerText = `Bảng dữ liệu Excel (Đã cấu trúc ${dataArray.length} nhân sự thành công)`;
        }

        function openEditModal(index) {
            const data = localExcelData[index];
            document.getElementById('edit-index').value = index;
            document.getElementById('edit-hoten').value = data["Họ và Tên"] === "—" ? "" : data["Họ và Tên"];
            document.getElementById('edit-ngaysinh').value = data["Năm sinh"] === "—" ? "" : data["Năm sinh"];
            document.getElementById('edit-bhxh').value = data["Số sổ bảo hiểm"] === "—" ? "" : data["Số sổ bảo hiểm"];
            document.getElementById('edit-cccd').value = data["Số căn cước công dân"] === "—" ? "" : data["Số căn cước công dân"];
            document.getElementById('edit-vehưu').value = data["Năm về hưu"] === "—" ? "" : data["Năm về hưu"];
            document.getElementById('edit-huuluat').value = data["Hưu luật mới"] === "—" ? "" : data["Hưu luật mới"];
            document.getElementById('edit-atv').value = data["An toàn viên"] === "—" ? "" : data["An toàn viên"];
            document.getElementById('edit-nndh').value = data["NNĐH"] === "—" ? "" : data["NNĐH"];
            document.getElementById('edit-chucdanh').value = data["Chức danh công việc"] === "—" ? "" : data["Chức danh công việc"];
            document.getElementById('edit-modal-backdrop').style.display = 'flex';
        }

        document.getElementById('edit-modal-backdrop').onclick = function(e) {
            if(e.target === this) closeEditModal();
        };

        function closeEditModal() { document.getElementById('edit-modal-backdrop').style.display = 'none'; }

        function saveRowCalculations() {
            const idx = document.getElementById('edit-index').value;
            
            localExcelData[idx]["Họ và Tên"] = document.getElementById('edit-hoten').value || "—";
            localExcelData[idx]["Năm sinh"] = document.getElementById('edit-ngaysinh').value || "—";
            localExcelData[idx]["Số sổ bảo hiểm"] = document.getElementById('edit-bhxh').value || "—";
            localExcelData[idx]["Số căn cước công dân"] = document.getElementById('edit-cccd').value || "—";
            localExcelData[idx]["Năm về hưu"] = document.getElementById('edit-vehưu').value || "—";
            localExcelData[idx]["Hưu luật mới"] = document.getElementById('edit-huuluat').value || "—";
            localExcelData[idx]["An toàn viên"] = document.getElementById('edit-atv').value || "—";
            localExcelData[idx]["NNĐH"] = document.getElementById('edit-nndh').value || "—";
            localExcelData[idx]["Chức danh công việc"] = document.getElementById('edit-chucdanh').value || "—";

            // Kích hoạt bộ xử lý để tự động tính lại tuổi theo mốc 2026 và ép chuẩn ngày tháng
            localExcelData[idx] = calculateRowDependencies(localExcelData[idx], idx);

            renderOrderedTable(localExcelData);
            closeEditModal();
        }

        function applyAdvancedFilters() {
            const query = document.getElementById('filter-search-global').value.toLowerCase().trim();
            if(!query) { renderOrderedTable(localExcelData); return; }
            const res = localExcelData.filter(r => Object.values(r).some(v => v.toString().toLowerCase().includes(query)));
            renderOrderedTable(res);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + tabId).style.display = 'block';
            event.target.classList.add('active');
        }

        window.onload = () => {
            checkSupabaseConnection();
            setInterval(() => {
                const now = new Date();
                document.getElementById('live-clock').innerText = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
            }, 1000);
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date-duong').innerText = new Date().toLocaleDateString('vi-VN', options);
        };
    </script>
</body>
</html>
