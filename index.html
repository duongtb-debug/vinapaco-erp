                                    <th class="text-center font-bold w-48">Hành Động</th>
                                </tr>

                                <tr><td colspan="8" class="text-center py-6 text-slate-500">Chưa có dữ liệu lịch sử bảo dưỡng thiết bị.</td></tr>

    </main>

    <div id="printArea" class="print-area hidden">
        <div id="printGrid" class="grid grid-cols-2 gap-4 p-4"></div>
    </div>

    <script>
        // Khởi tạo các mảng dữ liệu mô phỏng cục bộ (Hệ thống sẽ đồng bộ với Cloud Supabase nếu cấu hình)
        let db_nhansu = [];
        let db_thietbi = [];
        let db_suachua = [];

        // Khởi tạo biến toàn cục lưu trữ đối tượng Chart.js
        let rChart, gChart, dChart, rcChart, rpChart;

        // Hàm chuyển đổi phân hệ (Tab Switch)
        function switchSection(sectionId) {
            document.querySelectorAll('.app-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
            
            if(sectionId === 'hoso') {
                document.getElementById('sec_hoso').classList.add('active');
                document.getElementById('tab_hoso').classList.add('active');
            } else if(sectionId === 'thietbi') {
                document.getElementById('sec_thietbi').classList.add('active');
                document.getElementById('tab_thietbi').classList.add('active');
                updateUnitDropdowns();
                displayThietBi();
            } else if(sectionId === 'suachua') {
                document.getElementById('sec_suachua').classList.add('active');
                document.getElementById('tab_suachua').classList.add('active');
                displaySuaChua();
                updateRepairChartsAndStats();
            }
        }

        // Đọc dữ liệu từ file Excel Hồ sơ nhân sự
        function importExcelNhanSu(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet);
                
                db_nhansu = jsonData.map((row, index) => {
                    // Xử lý tính toán ngày tháng năm sinh và tuổi nghỉ hưu tương đối năm 2026
                    let birthYear = 1980;
                    if(row['Ngày Sinh']) {
                        const parts = String(row['Ngày Sinh']).split(/[-/]/);
                        if(parts.length === 3) birthYear = parseInt(parts[2]);
                    }
                    const currentYear = 2026;
                    const age = currentYear - birthYear;
                    const retireYear = birthYear + (row['Giới Tính'] === 'Nữ' ? 60 : 62);

                    return {
                        id: 'NS-' + (1000 + index),
                        stt_goc: row['STT'] || (index + 1),
                        hoten: row['Họ và Tên'] || 'Chưa rõ',
                        bhxh: row['Số Sổ BHXH'] || '---',
                        cccd: row['Số CCCD'] || '---',
                        gioitinh: row['Giới Tính'] || 'Nam',
                        ngaysinh: row['Ngày Sinh'] || '01/01/1980',
                        tuoi: age,
                        atv: row['ATV'] || 'Không',
                        nndh: row['NNĐH'] || 'Không',
                        ngayvehuu: '01/01/' + retireYear,
                        madonvi: row['Mã Đơn Vị'] || 'VP-TCT',
                        chucdanh: row['Chức Danh Công Việc'] || 'Nhân viên'
                    };
                });

                document.getElementById('count_ns').innerText = db_nhansu.length;
                updateNhanSuStatsAndCharts();
                displayNhanSuTable();
                updateUnitDropdowns();
                alert('Nạp thành công ' + db_nhansu.length + ' hồ sơ nhân sự vào bộ nhớ đệm!');
            };
            reader.readAsArrayBuffer(file);
        }

        // Cập nhật biểu đồ cấu trúc phòng ban, giới tính và hưu trí
        function updateNhanSuStatsAndCharts() {
            if(db_nhansu.length === 0) return;

            const maleCount = db_nhansu.filter(p => p.gioitinh === 'Nam').length;
            const femaleCount = db_nhansu.filter(p => p.gioitinh === 'Nữ').length;
            const atvCount = db_nhansu.filter(p => p.atv === 'Có' || p.atv === 'Y').length;
            const nndhCount = db_nhansu.filter(p => p.nndh === 'Có' || p.nndh === 'Y').length;

            document.getElementById('hr_stat_male').innerText = Math.round((maleCount/db_nhansu.length)*100) + '%';
            document.getElementById('hr_stat_female').innerText = Math.round((femaleCount/db_nhansu.length)*100) + '%';
            document.getElementById('hr_stat_atv').innerText = atvCount + ' người';
            document.getElementById('hr_stat_nndh').innerText = nndhCount + ' người';

            // Khởi tạo/Cập nhật các biểu đồ Chart.js
            const ctxGender = document.getElementById('genderChart').getContext('2d');
            if(gChart) gChart.destroy();
            gChart = new Chart(ctxGender, {
                type: 'pie',
                data: {
                    labels: ['Nam', 'Nữ'],
                    datasets: [{
                        data: [maleCount, femaleCount],
                        backgroundColor: ['#059669', '#f43f5e']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // Hiện danh sách nhân sự lên giao diện table
        function displayNhanSuTable() {
            const tbody = document.getElementById('table_hoso_body');
            tbody.innerHTML = '';
            
            if(db_nhansu.length === 0) {
                tbody.innerHTML = `<tr><td colspan="13" class="text-center py-6">Không có dữ liệu hiển thị. Hãy nạp file Excel gốc.</td></tr>`;
                return;
            }

            db_nhansu.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="text-center font-bold text-emerald-800">${p.id}</td>
                    <td class="text-center">${p.stt_goc}</td>
                    <td class="font-bold">${p.hoten}</td>
                    <td>${p.bhxh}</td>
                    <td>${p.cccd}</td>
                    <td class="text-center">${p.gioitinh}</td>
                    <td class="text-center">${p.ngaysinh}</td>
                    <td class="text-center font-bold">${p.tuoi}</td>
                    <td class="text-center">${p.atv}</td>
                    <td class="text-center">${p.nndh}</td>
                    <td class="text-center text-rose-700 font-bold">${p.ngayvehuu}</td>
                    <td class="text-center font-bold">${p.madonvi}</td>
                    <td>${p.chucdanh}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Đồng bộ danh mục Đơn Vị Phòng Ban từ tệp nhân sự sang cấu trúc cấp phát thiết bị
        function updateUnitDropdowns() {
            const donviSet = new Set(db_nhansu.map(p => p.madonvi));
            const filterDonVi = document.getElementById('filter_donvi');
            const devFilterDonVi = document.getElementById('dev_filter_donvi');
            
            // Xóa dữ liệu cũ trừ dòng đầu tiên
            filterDonVi.innerHTML = '<option value="">-- Tất cả Mã Đơn Vị --</option>';
            devFilterDonVi.innerHTML = '<option value="">-- Chọn đơn vị --</option>';

            donviSet.forEach(dv => {
                if(!dv) return;
                const opt1 = new ArrayOption(dv, dv);
                filterDonVi.options.add(new Option(dv, dv));
                devFilterDonVi.options.add(new Option(dv, dv));
            });
        }

        // Cơ chế gợi ý thông minh nhân viên quản lý thiết bị trực thuộc mã đơn vị đã chọn
        function smartSuggest(input) {
            const unit = document.getElementById('dev_filter_donvi').value;
            const suggestBox = document.getElementById('dev_suggest');
            suggestBox.innerHTML = '';

            let filtered = db_nhansu;
            if (unit) {
                filtered = db_nhansu.filter(p => p.madonvi === unit);
            }

            const val = input.value.toLowerCase();
            const matches = filtered.filter(p => p.hoten.toLowerCase().includes(val) || p.id.toLowerCase().includes(val));

            if(matches.length === 0) {
                suggestBox.innerHTML = '<div class="p-2 text-xs text-gray-400">Không tìm thấy kết quả</div>';
                return;
            }

            matches.slice(0, 8).forEach(p => {
                const div = document.createElement('div');
                div.className = 'p-3 hover:bg-emerald-50 cursor-pointer border-b text-sm font-bold';
                div.innerHTML = `<i class="fa-solid fa-user text-emerald-700 mr-2"></i> ${p.hoten} (${p.id} - ${p.madonvi})`;
                div.onclick = function() {
                    input.value = p.hoten;
                    document.getElementById('dev_user_id').value = p.id;
                    suggestBox.innerHTML = '';
                };
                suggestBox.appendChild(div);
            });
        }

        // Đóng hộp gợi ý khi click ra ngoài
        document.addEventListener('click', function(e) {
            if(e.target.id !== 'dev_user_search') {
                document.getElementById('dev_suggest').innerHTML = '';
            }
            if(e.target.id !== 'rep_device_search') {
                document.getElementById('rep_device_suggest').style.display = 'none';
            }
        });

        // Xử lý logic Thêm/Cập nhật cấu hình Cấp Phát Thiết Bị & Tài Sản
        function saveDeviceConfig() {
            const idInput = document.getElementById('editing_device_id').value;
            const name = document.getElementById('dev_name').value;
            let code = document.getElementById('dev_code').value;
            const unit = document.getElementById('dev_filter_donvi').value;
            const manager = document.getElementById('dev_user_search').value;
            const status = document.getElementById('dev_status_select').value;

            if(!name || !unit || !manager) {
                alert('Vui lòng nhập đầy đủ các trường thông tin bắt buộc (*)!');
                return;
            }

            if(!code) {
                code = 'EQ-' + unit + '-' + Math.floor(1000 + Math.random() * 9000);
            }

            if(idInput) {
                // Cập nhật thiết bị hiện tại
                const index = db_thietbi.findIndex(d => d.id === idInput);
                if(index > -1) {
                    db_thietbi[index] = { id: idInput, code, name, manager, unit, status };
                }
            } else {
                // Thêm thiết bị mới hoàn toàn
                db_thietbi.push({
                    id: 'DEV-' + Date.now(),
                    code, name, manager, unit, status
                });
            }

            clearDeviceForm();
            displayThietBi();
            alert('Lưu thông tin thiết bị tài sản thành công!');
        }

        function clearDeviceForm() {
            document.getElementById('editing_device_id').value = '';
            document.getElementById('dev_name').value = '';
            document.getElementById('dev_code').value = '';
            document.getElementById('dev_user_search').value = '';
            document.getElementById('dev_user_id').value = '';
            document.getElementById('form_device_title').innerHTML = '<i class="fa-solid fa-square-plus text-amber-600"></i> KHAI BÁO CẤP PHÁT THIẾT BỊ & TÀI SẢN MỚI';
        }

        // Hiển thị danh sách thiết bị và tự động kết xuất chuỗi Base64 mã QR độ sắc nét cao
        function displayThietBi() {
            const tbody = document.getElementById('table_thietbi_body');
            tbody.innerHTML = '';
            const keyword = document.getElementById('search_thietbi').value.toLowerCase();

            const filtered = db_thietbi.filter(d => 
                d.name.toLowerCase().includes(keyword) || 
                d.code.toLowerCase().includes(keyword) || 
                d.manager.toLowerCase().includes(keyword)
            );

            if(filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-6 text-gray-500">Chưa có thiết bị nào được khai báo hoặc không tìm thấy kết quả phù hợp.</td></tr>`;
                return;
            }

            filtered.forEach(d => {
                // Sử dụng qrcode-generator tạo mã hóa QR siêu ổn định
                const qr = qrcode(4, 'M');
                qr.addData(`Mã TS: ${d.code}\nTên TS: ${d.name}\nQL: ${d.manager}\nĐơn vị: ${d.unit}`);
                qr.make();
                const qrImgTag = qr.createImgTag(4, 8); // Tạo chuỗi thẻ <img> hoàn chỉnh chứa Base64 dữ liệu ảnh mã QR

                const statusClass = d.status === 'Đang sử dụng' ? 'status-using' : 'status-broken';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="text-center qr-canvas py-2">${qrImgTag}</td>
                    <td class="font-bold text-amber-700">${d.code}</td>
                    <td class="font-bold">${d.name}</td>
                    <td>${d.manager}</td>
                    <td class="text-center font-bold">${d.unit}</td>
                    <td class="text-center"><span class="px-2 py-1 rounded font-bold text-xs ${statusClass}">${d.status}</span></td>
                    <td class="text-center">
                        <div class="flex flex-wrap justify-center gap-2">
                            <button onclick="editDevice('${d.id}')" class="px-3 py-1.5 bg-sky-600 text-white rounded font-bold text-xs hover:bg-sky-700"><i class="fa-solid fa-pen-to-square"></i> Sửa</button>
                            <button onclick="deleteDevice('${d.id}')" class="px-3 py-1.5 bg-rose-600 text-white rounded font-bold text-xs hover:bg-rose-700"><i class="fa-solid fa-trash"></i> Xóa</button>
                            <button onclick="printSingleSticker('${d.id}')" class="px-3 py-1.5 bg-amber-500 text-white rounded font-bold text-xs hover:bg-amber-600"><i class="fa-solid fa-print"></i> In Tem</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function editDevice(id) {
            const d = db_thietbi.find(item => item.id === id);
            if(!d) return;

            document.getElementById('editing_device_id').value = d.id;
            document.getElementById('dev_name').value = d.name;
            document.getElementById('dev_code').value = d.code;
            document.getElementById('dev_filter_donvi').value = d.unit;
            document.getElementById('dev_user_search').value = d.manager;
            document.getElementById('dev_status_select').value = d.status;

            document.getElementById('form_device_title').innerHTML = '<i class="fa-solid fa-pen-to-square text-sky-600"></i> HIỆU CHỈNH THÔNG TIN THIẾT BỊ / TÀI SẢN';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteDevice(id) {
            if(confirm('Bạn có chắc chắn muốn xóa thiết bị này khỏi cơ sở dữ liệu? Lịch sử sửa chữa liên quan sẽ bị mồ côi.')) {
                db_thietbi = db_thietbi.filter(item => item.id !== id);
                displayThietBi();
            }
        }

        // Cơ chế hiển thị gợi ý danh sách thiết bị có sẵn khi lập biểu mẫu sửa chữa
        function suggestRepairDevice(input) {
            const suggestBox = document.getElementById('rep_device_suggest');
            suggestBox.innerHTML = '';
            suggestBox.style.display = 'block';

            const val = input.value.toLowerCase();
            const matches = db_thietbi.filter(d => d.name.toLowerCase().includes(val) || d.code.toLowerCase().includes(val));

            if(matches.length === 0) {
                suggestBox.innerHTML = '<div class="p-2 text-xs text-gray-400">Không tìm thấy thiết bị nào hợp lệ</div>';
                return;
            }

            matches.forEach(d => {
                const div = document.createElement('div');
                div.className = 'p-3 hover:bg-amber-50 cursor-pointer border-b text-sm font-bold';
                div.innerHTML = `<i class="fa-solid fa-laptop text-amber-700 mr-2"></i> ${d.name} [Mã: ${d.code}]`;
                div.onclick = function() {
                    input.value = `${d.name} (${d.code})`;
                    document.getElementById('rep_device_code').value = d.code;
                    document.getElementById('rep_device_name').value = d.name;
                    suggestBox.innerHTML = '';
                    suggestBox.style.display = 'none';
                };
                suggestBox.appendChild(div);
            });
        }

        // Tính toán chi phí sửa chữa cộng hưởng thuế suất VAT tự động
        function calculateTotalRepairCost() {
            const beforeTax = parseFloat(document.getElementById('rep_cost_before').value) || 0;
            const vatRate = parseFloat(document.getElementById('rep_vat_rate').value) || 0;
            const afterTax = beforeTax + (beforeTax * (vatRate / 100));
            
            // Định dạng tiền tệ VNĐ hiển thị trực quan
            document.getElementById('rep_cost_after').value = afterTax.toLocaleString('vi-VN') + ' đ';
        }

        // Thêm mới hoặc cập nhật thông tin quyết toán chi phí sửa chữa
        function saveRepairConfig() {
            const idInput = document.getElementById('editing_repair_id').value;
            const devCode = document.getElementById('rep_device_code').value;
            const devName = document.getElementById('rep_device_name').value;
            const title = document.getElementById('rep_title').value;
            const beneficiary = document.getElementById('rep_beneficiary').value;
            const bankAccount = document.getElementById('rep_bank_account').value;
            const bankName = document.getElementById('rep_bank_name').value;
            const costBefore = parseFloat(document.getElementById('rep_cost_before').value) || 0;
            const vatRate = parseFloat(document.getElementById('rep_vat_rate').value) || 0;
            const status = document.getElementById('rep_status').value;

            if(!devCode || !title || !beneficiary || costBefore <= 0) {
                alert('Vui lòng chọn thiết bị tài sản và nhập đầy đủ chi phí, nội dung sửa chữa bắt buộc!');
                return;
            }

            const costAfter = costBefore + (costBefore * (vatRate / 100));

            if(idInput) {
                const index = db_suachua.findIndex(r => r.id === idInput);
                if(index > -1) {
                    db_suachua[index] = { id: idInput, devCode, devName, title, beneficiary, bankAccount, bankName, costBefore, vatRate, costAfter, status };
                }
            } else {
                db_suachua.push({
                    id: 'REP-' + Date.now(),
                    devCode, devName, title, beneficiary, bankAccount, bankName, costBefore, vatRate, costAfter, status
                });
            }

            clearRepairForm();
            displaySuaChua();
            updateRepairChartsAndStats();
            alert('Phiếu quyết toán chi phí bảo dưỡng đã được cập nhật thành công!');
        }

        function clearRepairForm() {
            document.getElementById('editing_repair_id').value = '';
            document.getElementById('rep_device_search').value = '';
            document.getElementById('rep_device_code').value = '';
            document.getElementById('rep_device_name').value = '';
            document.getElementById('rep_title').value = '';
            document.getElementById('rep_beneficiary').value = '';
            document.getElementById('rep_bank_account').value = '';
            document.getElementById('rep_bank_name').value = '';
            document.getElementById('rep_cost_before').value = '';
            document.getElementById('rep_cost_after').value = '';
            document.getElementById('form_repair_title').innerHTML = '<i class="fa-solid fa-receipt"></i> Lập Phiếu quyết toán bảo dưỡng / sửa chữa';
        }

        // Kết xuất danh sách nhật ký phiếu bảo trì sửa chữa ra giao diện bảng
        function displaySuaChua() {
            const tbody = document.getElementById('table_suachua_body');
            tbody.innerHTML = '';
            const keyword = document.getElementById('search_suachua').value.toLowerCase();

            const filtered = db_suachua.filter(r => 
                r.title.toLowerCase().includes(keyword) || 
                r.devCode.toLowerCase().includes(keyword) || 
                r.beneficiary.toLowerCase().includes(keyword)
            );

            if(filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center py-6 text-gray-500">Chưa có bản ghi quyết toán nào phù hợp với bộ lọc tìm kiếm.</td></tr>`;
                return;
            }

            filtered.forEach(r => {
                const statusColor = r.status === 'Đã quyết toán' ? 'text-emerald-700 font-bold' : 'text-amber-600 font-bold';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="font-bold text-emerald-900">${r.devCode}</td>
                    <td>
                        <div class="font-bold text-slate-900">${r.title}</div>
                        <div class="text-xs text-gray-500 italic">Thiết bị: ${r.devName}</div>
                    </td>
                    <td>
                        <div class="font-bold">${r.beneficiary}</div>
                        <div class="text-xs text-slate-600">${r.bankAccount ? (r.bankAccount + ' - ' + r.bankName) : 'Tiền mặt/Chuyển khoản trực tiếp'}</div>
                    </td>
                    <td class="text-right font-semibold">${r.costBefore.toLocaleString('vi-VN')} đ</td>
                    <td class="text-center text-xs font-bold text-blue-800">${r.vatRate}%</td>
                    <td class="text-right font-black text-emerald-900">${r.costAfter.toLocaleString('vi-VN')} đ</td>
                    <td class="text-center ${statusColor} text-sm">${r.status}</td>
                    <td class="text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick="editRepair('${r.id}')" class="px-3 py-1 bg-sky-600 text-white rounded font-bold text-xs hover:bg-sky-700"><i class="fa-solid fa-edit"></i> Sửa</button>
                            <button onclick="deleteRepair('${r.id}')" class="px-3 py-1 bg-rose-600 text-white rounded font-bold text-xs hover:bg-rose-700"><i class="fa-solid fa-trash"></i> Xóa</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function editRepair(id) {
            const r = db_suachua.find(item => item.id === id);
            if(!r) return;

            document.getElementById('editing_repair_id').value = r.id;
            document.getElementById('rep_device_search').value = `${r.devName} (${r.devCode})`;
            document.getElementById('rep_device_code').value = r.devCode;
            document.getElementById('rep_device_name').value = r.devName;
            document.getElementById('rep_title').value = r.title;
            document.getElementById('rep_beneficiary').value = r.beneficiary;
            document.getElementById('rep_bank_account').value = r.bankAccount;
            document.getElementById('rep_bank_name').value = r.bankName;
            document.getElementById('rep_cost_before').value = r.costBefore;
            document.getElementById('rep_vat_rate').value = r.vatRate;
            document.getElementById('rep_status').value = r.status;

            calculateTotalRepairCost();
            document.getElementById('form_repair_title').innerHTML = '<i class="fa-solid fa-edit text-sky-600"></i> HIỆU CHỈNH PHIẾU QUYẾT TOÁN CHI PHÍ SỬA CHỮA';
        }

        function deleteRepair(id) {
            if(confirm('Bạn có chắc muốn xóa vĩnh viễn phiếu quyết toán bảo trì này?')) {
                db_suachua = db_suachua.filter(item => item.id !== id);
                displaySuaChua();
                updateRepairChartsAndStats();
            }
        }

        // Cập nhật thẻ thống kê tài chính và các biểu đồ cấu trúc chi phí sửa chữa liên quan
        function updateRepairChartsAndStats() {
            let totalBefore = 0;
            let totalAfter = 0;
            let completedCount = 0;
            let pendingCount = 0;

            db_suachua.forEach(r => {
                totalBefore += r.costBefore;
                totalAfter += r.costAfter;
                if(r.status === 'Đã quyết toán') completedCount++;
                else pendingCount++;
            });

            document.getElementById('lbl_stat_rep_count').innerText = db_suachua.length + ' hồ sơ';
            document.getElementById('lbl_stat_total_before').innerText = totalBefore.toLocaleString('vi-VN') + ' đ';
            document.getElementById('lbl_stat_total_after').innerText = totalAfter.toLocaleString('vi-VN') + ' đ';

            // Biểu đồ hình khuyên tiến độ thanh toán tài chính
            const ctxPayment = document.getElementById('repairPaymentChart').getContext('2d');
            if(rpChart) rpChart.destroy();
            rpChart = new Chart(ctxPayment, {
                type: 'doughnut',
                data: {
                    labels: ['Đã quyết toán', 'Chưa thanh toán'],
                    datasets: [{
                        data: [completedCount, pendingCount],
                        backgroundColor: ['#047857', '#d97706']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // Xử lý in nhãn dán QR đơn lẻ cho thiết bị tài sản
        function printSingleSticker(id) {
            const d = db_thietbi.find(item => item.id === id);
            if(!d) return;

            const qr = qrcode(4, 'M');
            qr.addData(`Mã TS: ${d.code}\nTên TS: ${d.name}\nQL: ${d.manager}`);
            qr.make();
            const qrImg = qr.createImgTag(4, 8);

            const printGrid = document.getElementById('printGrid');
            printGrid.innerHTML = `
                <div class="sticker-card p-4 border-2 border-dashed border-emerald-950 text-center rounded-lg">
                    <div class="font-bold text-xs uppercase text-emerald-900 border-b pb-1 mb-2">TỔNG CÔNG TY GIẤY VIỆT NAM</div>
                    <div class="my-2">${qrImg}</div>
                    <div class="font-bold text-sm text-amber-800">${d.code}</div>
                    <div class="text-xs font-bold text-slate-900">${d.name}</div>
                    <div class="text-[10px] text-gray-600">Đơn vị quản lý: ${d.unit}</div>
                </div>
            `;
            window.print();
        }

        // Chức năng an toàn bảo vệ việc xóa dữ liệu đám mây
        function triggerClearCloudWithPassword() {
            const pass = prompt('Vui lòng nhập mật khẩu quản trị cấp cao để dọn dẹp cơ sở dữ liệu đám mây:');
            if(pass === 'VINAPACO2026') {
                db_nhansu = [];
                db_thietbi = [];
                db_suachua = [];
                document.getElementById('count_ns').innerText = '0';
                displayNhanSuTable();
                displayThietBi();
                displaySuaChua();
                updateRepairChartsAndStats();
                alert('Toàn bộ cơ sở dữ liệu đám mây đã được làm sạch thành công!');
            } else if(pass !== null) {
                alert('Mật khẩu quản trị không chính xác! Thao tác bị từ chối.');
            }
        }
    </script>
</body>
</html>
