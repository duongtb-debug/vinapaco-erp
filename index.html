<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Nhân Sự Tự Động - Vinapaco ERP</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary-color: #1e3a8a;
            --accent-color: #ef4444;
            --success-color: #10b981;
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 24px; }
        .container { max-width: 100%; margin: 0 auto; padding: 0 12px; }
        
        header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white; padding: 24px; border-radius: 12px; margin-bottom: 24px; text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .main-layout { display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
        .card { background: var(--panel-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border-color); margin-bottom: 24px; }
        h2 { font-size: 1.1rem; color: var(--primary-color); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #eff6ff; }

        .btn { width: 100%; padding: 12px; margin-bottom: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background-color: #3b82f6; color: white; }
        .btn-danger { background-color: var(--accent-color); color: white; }
        .btn-success { background-color: var(--success-color); color: white; }
        
        .file-input-wrapper input[type="file"] { display: none; }
        .file-label { display: block; text-align: center; background-color: #2563eb; color: white; padding: 16px; border-radius: 8px; font-weight: 600; cursor: pointer; border: 2px dashed rgba(255,255,255,0.3); }

        .status-box { padding: 14px; border-radius: 8px; margin-top: 15px; font-size: 0.85rem; display: none; line-height: 1.6; }
        .table-container { overflow-x: auto; margin-top: 10px; background: white; border-radius: 8px; border: 1px solid var(--border-color); }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 800px; }
        th, td { padding: 12px 14px; border-bottom: 1px solid var(--border-color); text-align: left; white-space: nowrap; }
        th { background-color: #f1f5f9; color: #1e293b; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
        tr:hover { background-color: #f8fafc; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>HỆ THỐNG QUẢN LÝ DỮ LIỆU ĐA CỘT TỰ ĐỘNG - VINAPACO</h1>
        <p>⚡ Tự Động Hiển Thị 100% Cột Từ File Excel & Trích Xuất Tên Gọi Chính Xác ⚡</p>
    </header>

    <div class="main-layout">
        <div class="sidebar">
            <div class="card">
                <h2>☁️ CƠ SỞ DỮ LIỆU ĐÁM MÂY</h2>
                <button class="btn btn-primary" id="btn-fetch-cloud">🔄 Làm mới hiển thị bảng</button>
                <button class="btn btn-danger" id="btn-clear-cloud">🗑️ Xóa dữ liệu bảng</button>
            </div>

            <div class="card">
                <h2>📥 NẠP FILE EXCEL DỮ LIỆU</h2>
                <div class="file-input-wrapper">
                    <label for="excel-file-input" class="file-label" id="main-file-label">⚡ CHỌN FILE EXCEL ĐỂ ĐỒNG BỘ ⚡</label>
                    <input type="file" id="excel-file-input" accept=".xlsx, .xls">
                </div>
                <div class="status-box" id="process-status-box"></div>
            </div>

            <div class="card">
                <h2>📊 XUẤT FILE DATA</h2>
                <button class="btn btn-success" id="btn-export-excel"> Xuất Toàn Bộ Excel</button>
            </div>
        </div>

        <div class="content-area">
            <div class="card">
                <h2 id="table-title">📋 DANH SÁCH CHI TIẾT CÁC TRƯỜNG DỮ LIỆU</h2>
                <div class="table-container">
                    <table id="dynamic-data-table">
                        <thead id="table-head">
                            <tr>
                                <th>STT</th>
                                <th>Thông báo</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <tr>
                                <td colspan="2" style="text-align: center; color: #94a3b8; padding: 40px;">Hệ thống đang sẵn sàng kết nối...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const DB_URL = "https://mtfpxsfxjsnghtalamdd.supabase.co"; 
    const DB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10ZnB4c2Z4anNuZ2h0YWxhbWRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODUyNjgsImV4cCI6MjA5Njc2MTI2OH0.Ar98twFixlxq1qMNqQAwgNWX0VvrdGGVB4fFvoLO7UQ"; 
    
    const globalSupabase = supabase.createClient(DB_URL, DB_KEY);

    // Chuẩn hóa chuỗi tìm kiếm tiêu đề
    function clearAccentsAndSpaces(str) {
        if (!str) return '';
        return String(str).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[_\s\-\.\,\/]/g, "");
    }

    // Hàm tự động trích xuất Tên Gọi từ cột Họ và Tên
    function trichXuatTenGoi(hoTen ToanBo) {
        if (!hoTenToanBo) return "";
        const parts = String(hoTenToanBo).trim().split(/\s+/);
        return parts.length > 0 ? parts[parts.length - 1] : "";
    }

    // TẢI VÀ DỰNG BẢNG HOÀN TOÀN TỰ ĐỘNG DỰA TRÊN DỮ LIỆU THỰC TẾ
    async function lamMoiBangDuLieu() {
        const thead = document.getElementById('table-head');
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = `<tr><td style="text-align: center; padding: 40px;">⏳ Đang đồng bộ hóa cấu trúc và tải dữ liệu từ đám mây...</td></tr>`;

        try {
            const { data, error } = await globalSupabase.from('nhan_su').select('*').order('id', { ascending: true });
            if (error) throw error;

            if (!data || data.length === 0) {
                thead.innerHTML = `<tr><th>STT</th><th>Trạng thái</th></tr>`;
                tbody.innerHTML = `<tr><td>1</td><td style="color: #94a3b8;">📭 Cơ sở dữ liệu trống. Hãy nạp file Excel của bạn!</td></tr>`;
                return;
            }

            // Thu thập tất cả các thuộc tính (cột) thực tế đang có trong database để dựng bảng động
            let tatCaCot = new Set();
            data.forEach(item => {
                Object.keys(item).forEach(key => {
                    if (key !== 'id') tatCaCot.add(key);
                });
            });

            // Chuyển Set thành mảng cố định để ánh xạ cột
            const mangCotHienThi = Array.from(tatCaCot);

            // Dựng tiêu đề bảng (Thêm cột Tên Gọi kế bên cột Họ Tên nếu có)
            let headHtml = `<tr><th style="width: 50px;">STT</th>`;
            mangCotHienThi.forEach(col => {
                let tenHienThi = col;
                if (col === 'ho_ten') tenHienThi = "Họ và Tên";
                if (col === 'ten') tenHienThi = "Tên gọi (Đã tách)";
                if (col === 'so_so_bhxh') tenHienThi = "Số sổ BHXH";
                if (col === 'so_cccd') tenHienThi = "Số CCCD";
                headHtml += `<th>${tenHienThi}</th>`;
            });
            headHtml += `</tr>`;
            thead.innerHTML = headHtml;

            // Đổ dữ liệu động vào từng dòng
            tbody.innerHTML = "";
            data.forEach((row, index) => {
                let trHtml = `<tr><td>${index + 1}</td>`;
                mangCotHienThi.forEach(col => {
                    let giaTri = row[col] !== null && row[col] !== undefined ? row[col] : "---";
                    if (col === 'ho_ten') {
                        trHtml += `<td style="font-weight: 600; color: #1e3a8a;">${giaTri}</td>`;
                    } else {
                        trHtml += `<td>${giaTri}</td>`;
                    }
                });
                trHtml += `</tr>`;
                
                const tr = document.createElement('tr');
                tr.innerHTML = trHtml;
                tbody.appendChild(tr);
            });

            document.getElementById('table-title').innerText = `📋 DANH SÁCH NHÂN SỰ (ĐANG HIỂN THỊ ĐẦY ĐỦ ${mangCotHienThi.length} TRƯỜNG DỮ LIỆU)`;

        } catch (e) {
            tbody.innerHTML = `<tr><td style="text-align: center; color: var(--accent-color); padding: 40px; font-weight:bold;">❌ Lỗi kết nối cấu trúc: ${e.message}</td></tr>`;
        }
    }

    // ĐỌC VÀ ĐỒNG BỘ FILE EXCEL ĐA TRƯỜNG DỮ LIỆU
    document.getElementById('excel-file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const label = document.getElementById('main-file-label');
        const statusBox = document.getElementById('process-status-box');
        
        label.innerText = "⏳ ĐANG ĐỒNG BỘ...";
        statusBox.style.display = "block";
        statusBox.style.backgroundColor = "#fffbeb"; statusBox.style.borderColor = "#fef3c7"; statusBox.style.color = "#b45309";
        statusBox.innerHTML = `⏳ <b>Bước 1:</b> Đang phân tích file Excel đa trường...`;

        const reader = new FileReader();
        reader.onload = async function(evt) {
            try {
                const data = evt.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const parsedData = XLSX.utils.sheet_to_json(worksheet);
                
                if (parsedData.length === 0) throw new Error("Tệp Excel trống!");

                // Lấy danh sách cột thực tế của file Excel nạp vào
                const excelHeaders = Object.keys(parsedData[0]);

                // Luật tìm cột họ tên để làm căn cứ bóc tách tên gọi
                const hoTenKeywords = ['hoten', 'hovaten', 'nhanvien', 'tennhanvien', 'fullname', 'ten'];
                const matchedHoTenColumn = excelHeaders.find(header => {
                    const cleaned = clearAccentsAndSpaces(header);
                    return hoTenKeywords.some(kw => cleaned.includes(kw));
                }) || excelHeaders[0];

                statusBox.innerHTML += `<br>✅ <b>Bước 2:</b> Nhận diện cột chủ chốt [<b>${matchedHoTenColumn}</b>] để bóc tách tên gọi chính xác.`;

                const baseTimestamp = Date.now();

                // Tạo danh sách payload động, map chuẩn xác 100% tất cả các trường dữ liệu từ file Excel vào DB
                const payload = parsedData.map((row, index) => {
                    let obj = {
                        id: baseTimestamp + index // Khắc phục lỗi ràng buộc khóa chính ID dứt điểm
                    };

                    // Đổ toàn bộ các thuộc tính từ file excel vào object
                    excelHeaders.forEach(header => {
                        let fieldKey = clearAccentsAndSpaces(header);
                        
                        // Quy chuẩn hóa một số trường lõi để đồng bộ giao diện
                        if (header === matchedHoTenColumn) fieldKey = 'ho_ten';
                        if (fieldKey === 'bhxh' || fieldKey === 'sosobhxh') fieldKey = 'so_so_bhxh';
                        if (fieldKey === 'cccd' || fieldKey === 'socccd') fieldKey = 'so_cccd';

                        obj[fieldKey] = row[header] !== undefined && row[header] !== null ? String(row[header]).trim() : "";
                    });

                    // CHUẨN HÓA: Tự động trích xuất trường tên gọi (Chỉ lấy tên cuối cùng)
                    const hoTenGoc = row[matchedHoTenColumn] || "";
                    obj['ten'] = trichXuatTenGoi(hoTenGoc);

                    return obj;
                });

                statusBox.innerHTML += `<br>⏳ <b>Bước 3:</b> Đang lưu trữ dữ liệu an toàn lên đám mây...`;

                const { error } = await globalSupabase.from('nhan_su').insert(payload);
                if (error) throw error;

                statusBox.style.backgroundColor = "#f0fdf4"; statusBox.style.borderColor = "#bbf7d0"; statusBox.style.color = "#166534";
                statusBox.innerHTML = `🎉 <b>HOÀN THÀNH HOÀN HẢO!</b><br>Đã nạp hiển thị đầy đủ và bóc tách dữ liệu <b>[${payload.length}]</b> nhân sự thành công.`;
                
                label.innerText = "⚡ CHỌN FILE EXCEL ĐỂ ĐỒNG BỘ ⚡";
                document.getElementById('excel-file-input').value = "";
                lamMoiBangDuLieu();

            } catch (err) {
                statusBox.style.backgroundColor = "#fef2f2"; statusBox.style.borderColor = "#fca5a5"; statusBox.style.color = "#991b1b";
                statusBox.innerHTML = `❌ <b>Lỗi đồng bộ:</b> ${err.message}`;
                label.innerText = "⚡ CHỌN FILE EXCEL ĐỂ ĐỒNG BỘ ⚡";
                document.getElementById('excel-file-input').value = "";
            }
        };
        reader.readAsBinaryString(file);
    });

    // XÓA DỮ LIỆU
    document.getElementById('btn-clear-cloud').addEventListener('click', async () => {
        if (!confirm("⚠️ Bạn có chắc chắn muốn xóa dữ liệu hiện tại để làm mới?")) return;
        try {
            const { error } = await globalSupabase.from('nhan_su').delete().gt('id', 0);
            if (error) throw error;
            alert("🗑️ Đã làm sạch bảng thành công.");
            lamMoiBangDuLieu();
        } catch (e) { alert("Lỗi: " + e.message); }
    });

    // XUẤT EXCEL DỰA TRÊN CẤU TRÚC ĐỘNG
    document.getElementById('btn-export-excel').addEventListener('click', async () => {
        try {
            const { data, error } = await globalSupabase.from('nhan_su').select('*').order('id', { ascending: true });
            if (error || !data.length) return alert("Không có dữ liệu để xuất!");
            
            const cleanData = data.map(item => {
                let newItem = { ...item };
                delete newItem.id; // Ẩn cột ID hệ thống khi xuất file
                return newItem;
            });

            const ws = XLSX.utils.json_to_sheet(cleanData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data_Vinapaco");
            XLSX.writeFile(wb, "Bao_Cao_Nhan_Su_Vinapaco.xlsx");
        } catch (e) { alert("Lỗi xuất file: " + e.message); }
    });

    document.getElementById('btn-fetch-cloud').addEventListener('click', lamMoiBangDuLieu);
    window.onload = lamMoiBangDuLieu;
</script>
</body>
</html>
