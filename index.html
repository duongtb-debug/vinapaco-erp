<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Nhân Sự Toàn Diện - Vinapaco ERP</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary-color: #1e3a8a;
            --accent-color: #ef4444;
            --success-color: #10b981;
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 24px; }
        .container { max-width: 1600px; margin: 0 auto; }
        
        header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white; padding: 24px; border-radius: 12px; margin-bottom: 24px; text-align: center;
        }

        .main-layout { display: grid; grid-template-columns: 350px 1fr; gap: 24px; }
        .card { background: var(--panel-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border-color); margin-bottom: 24px; }
        h2 { font-size: 1.1rem; color: var(--primary-color); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #eff6ff; }

        .btn { width: 100%; padding: 12px; margin-bottom: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background-color: #3b82f6; color: white; }
        .btn-danger { background-color: var(--accent-color); color: white; }
        .btn-success { background-color: var(--success-color); color: white; }
        
        .file-input-wrapper input[type="file"] { display: none; }
        .file-label { display: block; text-align: center; background-color: #2563eb; color: white; padding: 16px; border-radius: 8px; font-weight: 600; cursor: pointer; border: 2px dashed rgba(255,255,255,0.3); }

        .status-box { padding: 14px; border-radius: 8px; margin-top: 15px; font-size: 0.85rem; display: none; line-height: 1.6; }
        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); text-align: left; }
        th { background-color: #f8fafc; color: #475569; font-weight: 600; }
        tr:hover { background-color: #f1f5f9; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>HỆ THỐNG QUẢN LÝ DỮ LIỆU NHÂN SỰ VINAPACO</h1>
        <p>🚀 Phiên Bản Khắc Phục Khớp Cột & Tự Động Sửa Lỗi Cấu Trúc ID Khóa Chính 🚀</p>
    </header>

    <div class="main-layout">
        <div class="sidebar">
            <div class="card">
                <h2>☁️ CƠ SỞ DỮ LIỆU ĐÁM MÂY</h2>
                <button class="btn btn-primary" id="btn-fetch-cloud">🔄 Làm mới từ đám mây</button>
                <button class="btn btn-danger" id="btn-clear-cloud">🗑️ Xóa sạch đám mây</button>
            </div>

            <div class="card">
                <h2>📥 NHẬP FILE DATA EXCEL</h2>
                <div class="file-input-wrapper">
                    <label for="excel-file-input" class="file-label" id="main-file-label">⚡ CHỌN FILE EXCEL ĐỂ ĐỒNG BỘ ⚡</label>
                    <input type="file" id="excel-file-input" accept=".xlsx, .xls">
                </div>
                <div class="status-box" id="process-status-box"></div>
            </div>

            <div class="card">
                <h2>📊 XUẤT BÁO CÁO</h2>
                <button class="btn btn-success" id="btn-export-excel"> Xuất Toàn Bộ Excel</button>
            </div>
        </div>

        <div class="content-area">
            <div class="card">
                <h2>📋 DANH SÁCH NHÂN SỰ ĐÃ ĐỒNG BỘ</h2>
                <div class="table-container">
                    <table id="data-table">
                        <thead>
                            <tr>
                                <th style="width: 60px;">STT</th>
                                <th>Họ và Tên</th>
                                <th>Tên gọi</th>
                                <th>Số Sổ BHXH</th>
                                <th>Số CCCD</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <tr>
                                <td colspan="5" style="text-align: center; color: #94a3b8; padding: 40px;">Đang kết nối đồng bộ...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const DB_URL = "https://mtfpxsfxjsnghtalamdd.supabase.co"; 
    const DB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10ZnB4c2Z4anNuZ2h0YWxhbWRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODUyNjgsImV4cCI6MjA5Njc2MTI2OH0.Ar98twFixlxq1qMNqQAwgNWX0VvrdGGVB4fFvoLO7UQ"; 
    
    const globalSupabase = supabase.createClient(DB_URL, DB_KEY);

    function clearAccentsAndSpaces(str) {
        if (!str) return '';
        return String(str).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[_\s\-\.\,\/]/g, "");
    }

    async function lamMoiBangDuLieu() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 40px;">⏳ Đang đồng bộ hóa dữ liệu từ đám mây...</td></tr>`;

        try {
            const { data, error } = await globalSupabase.from('nhan_su').select('ho_ten, ten, so_so_bhxh, so_cccd').order('ho_ten', { ascending: true });
            if (error) throw error;

            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #94a3b8; padding: 40px;">📭 Cơ sở dữ liệu trống. Hãy nạp file Excel!</td></tr>`;
                return;
            }

            tbody.innerHTML = "";
            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td style="font-weight: 600; color:#1e293b;">${item.ho_ten || '---'}</td>
                    <td>${item.ten || '---'}</td>
                    <td>${item.so_so_bhxh || '---'}</td>
                    <td>${item.so_cccd || '---'}</td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--accent-color); padding: 40px; font-weight:bold;">❌ Lỗi kết nối: ${e.message}</td></tr>`;
        }
    }

    document.getElementById('excel-file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const label = document.getElementById('main-file-label');
        const statusBox = document.getElementById('process-status-box');
        
        label.innerText = "⏳ ĐANG XỬ LÝ...";
        statusBox.style.display = "block";
        statusBox.style.backgroundColor = "#fffbeb"; statusBox.style.borderColor = "#fef3c7"; statusBox.style.color = "#b45309";
        statusBox.innerHTML = `⏳ <b>Bước 1:</b> Đang đọc tệp tin...`;

        const reader = new FileReader();
        reader.onload = async function(evt) {
            try {
                const data = evt.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const parsedData = XLSX.utils.sheet_to_json(worksheet);
                
                if (parsedData.length === 0) throw new Error("File Excel không có dữ liệu!");

                const excelHeaders = Object.keys(parsedData[0]);
                const rules = {
                    ho_ten: ['hoten', 'hovaten', 'nhanvien', 'tennhanvien', 'fullname'],
                    ten: ['ten', 'tengoi', 'firstname'],
                    so_so_bhxh: ['bhxh', 'baohiem', 'sosobhxh', 'sobhxh'],
                    so_cccd: ['cccd', 'cmnd', 'socccd', 'socmnd', 'cancuoc']
                };

                function findMatchedHeader(keywords) {
                    return excelHeaders.find(header => {
                        const cleaned = clearAccentsAndSpaces(header);
                        return keywords.some(kw => cleaned.includes(kw) || kw.includes(cleaned));
                    });
                }

                const matchedHoTen = findMatchedHeader(rules.ho_ten) || excelHeaders[1] || excelHeaders[0];
                const matchedTen = findMatchedHeader(rules.ten);
                const matchedBhxh = findMatchedHeader(rules.so_so_bhxh);
                const matchedCccd = findMatchedHeader(rules.so_cccd);

                statusBox.innerHTML += `<br>✅ <b>Bước 2:</b> Đã khớp cột thành công!`;

                // Tự sinh ID tuần tự dựa trên mốc thời gian để "bẻ gãy" lỗi Null Constraint phía database
                const baseTimestamp = Date.now();

                const payload = parsedData.map((row, index) => {
                    return {
                        id: baseTimestamp + index, // Giải pháp tối ưu: Tự cấp ID số nguyên duy nhất nếu database bị tắt auto-increment
                        ho_ten: row[matchedHoTen] ? String(row[matchedHoTen]).trim() : "Không rõ tên",
                        ten: matchedTen ? String(row[matchedTen] || '').trim() : "",
                        so_so_bhxh: matchedBhxh ? String(row[matchedBhxh] || '').trim() : "",
                        so_cccd: matchedCccd ? String(row[matchedCccd] || '').trim() : ""
                    };
                });

                statusBox.innerHTML += `<br>⏳ <b>Bước 3:</b> Đang tải dữ liệu lên Supabase...`;

                const { error } = await globalSupabase.from('nhan_su').insert(payload);
                if (error) throw error;

                statusBox.style.backgroundColor = "#f0fdf4"; statusBox.style.borderColor = "#bbf7d0"; statusBox.style.color = "#166534";
                statusBox.innerHTML = `🎉 <b>ĐỒNG BỘ HOÀN HẢO!</b><br>Đã nạp thành công <b>[${payload.length}]</b> nhân sự.`;
                
                label.innerText = "⚡ CHỌN FILE EXCEL ĐỂ ĐỒNG BỘ ⚡";
                document.getElementById('excel-file-input').value = "";
                lamMoiBangDuLieu();

            } catch (err) {
                statusBox.style.backgroundColor = "#fef2f2"; statusBox.style.borderColor = "#fca5a5"; statusBox.style.color = "#991b1b";
                statusBox.innerHTML = `❌ <b>Lỗi:</b> ${err.message}`;
                label.innerText = "⚡ CHỌN FILE EXCEL ĐỂ ĐỒNG BỘ ⚡";
                document.getElementById('excel-file-input').value = "";
            }
        };
        reader.readAsBinaryString(file);
    });

    document.getElementById('btn-clear-cloud').addEventListener('click', async () => {
        if (!confirm("⚠️ Bạn có chắc chắn muốn xóa TOÀN BỘ dữ liệu?")) return;
        try {
            const { error } = await globalSupabase.from('nhan_su').delete().gt('id', 0);
            if (error) throw error;
            alert("🗑️ Đã xóa sạch dữ liệu.");
            lamMoiBangDuLieu();
        } catch (e) { alert("Lỗi: " + e.message); }
    });

    document.getElementById('btn-export-excel').addEventListener('click', async () => {
        try {
            const { data, error } = await globalSupabase.from('nhan_su').select('ho_ten, ten, so_so_bhxh, so_cccd');
            if (error || !data.length) return alert("Không có dữ liệu!");
            
            const outData = data.map((item, index) => ({ "STT": index + 1, "Họ và Tên": item.ho_ten, "Tên": item.ten, "Số Sổ BHXH": item.so_so_bhxh, "Số CCCD": item.so_cccd }));
            const ws = XLSX.utils.json_to_sheet(outData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "DanhSachNhanSu");
            XLSX.writeFile(wb, "Danh_Sach_Nhan_Su_Vinapaco.xlsx");
        } catch (e) { alert("Lỗi: " + e.message); }
    });

    document.getElementById('btn-fetch-cloud').addEventListener('click', lamMoiBangDuLieu);
    window.onload = lamMoiBangDuLieu;
</script>
</body>
</html>
