<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lập Phiếu Bảo Dưỡng & Nhật Ký Quyết Toán</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --gray-light: #f8f9fa;
            --border-color: #ced4da;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); padding-bottom: 8px; margin-top: 0; font-size: 22px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #495057; font-size: 14px; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 4px; box-sizing: border-box; font-size: 14px; background-color: #fff; transition: all 0.3s; }
        input:disabled, select:disabled, textarea:disabled { background-color: #e9ecef; color: #6c757d; cursor: not-allowed; border-color: #dee2e6; }
        .btn-group { margin-top: 15px; display: flex; gap: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; transition: background 0.2s; display: inline-flex; align-items: center; gap: 5px; }
        .btn-edit { background-color: #ffc107; color: #000; }
        .btn-save { background-color: var(--success-color); color: white; display: none; }
        .btn-cancel { background-color: #6c757d; color: white; display: none; }
        .btn-upload { background-color: #17a2b8; color: white; }
        .btn-chot { background-color: var(--danger-color); color: white; width: 100%; padding: 15px; font-size: 16px; margin-top: 25px; justify-content: center; border-radius: 6px; }
        button:disabled { background-color: #cccccc !important; color: #666666 !important; cursor: not-allowed; }
        .file-zone { border: 2px dashed #cbd5e1; padding: 20px; border-radius: 6px; background: var(--gray-light); text-align: center; margin-top: 10px; position: relative; }
        .file-list { margin-top: 15px; padding: 0; list-style: none; }
        .file-item { display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 10px 15px; border: 1px solid #e2e8f0; border-radius: 4px; margin-bottom: 8px; font-size: 13px; }
        .file-info { display: flex; align-items: center; gap: 8px; }
        .remove-file { color: var(--danger-color); cursor: pointer; font-weight: bold; }
        .progress-container { width: 100%; background-color: #e9ecef; border-radius: 4px; margin-top: 10px; display: none; overflow: hidden; }
        .progress-bar { width: 0%; height: 18px; background-color: var(--success-color); text-align: center; color: white; font-size: 12px; line-height: 18px; transition: width 0.1s; }
        .lock-banner { background-color: #f8d7da; color: #721c24; padding: 15px; border-radius: 6px; border: 1px solid #f5c6cb; font-weight: bold; margin-bottom: 20px; display: none; text-align: center; font-size: 16px; }
        .section { background: #fff; border: 1px solid #e2e8f0; padding: 20px; border-radius: 6px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="lockBanner" class="lock-banner">
        🔒 PHIẾU ĐÃ CHỐT QUYẾT TOÁN. Toàn bộ dữ liệu đã được khóa, không thể chỉnh sửa hoặc nộp thêm file.
    </div>

    <div class="section">
        <h2>Mục 1: Lập Phiếu Bảo Dưỡng</h2>
        <div class="grid-2">
            <div class="form-group">
                <label>Mã phiếu bảo dưỡng</label>
                <input type="text" id="maPhieu" value="PBD-2026-001" disabled>
            </div>
            <div class="form-group">
                <label>Trạng thái quyết toán</label>
                <input type="text" id="trangThaiHienThi" value="Chưa chốt" disabled style="font-weight: bold; color: #e67e22;">
            </div>
        </div>
        <div class="form-group">
            <label>Nội dung / Hạng mục bảo dưỡng thiết bị</label>
            <textarea id="noiDungBD" rows="3" disabled>Bảo dưỡng định kỳ hệ thống máy nén khí trung tâm và thay thế bộ lọc dầu hiệu năng cao.</textarea>
        </div>
        
        <div class="form-group">
            <label>Tài liệu đính kèm minh chứng (Hỗ trợ PDF, Word, Excel, ZIP, CAD, Hình ảnh...)</label>
            <div class="file-zone">
                <input type="file" id="fileInput" multiple style="display: none;" onchange="handleFileSelect(this)">
                <button type="button" class="btn-upload" id="btnSelectFile" onclick="document.getElementById('fileInput').click()">📎 Chọn File đính kèm</button>
                <p style="margin: 8px 0 0 0; font-size: 12px; color: #64748b;">Hệ thống tự động chia nhỏ mảng file (Chunking) để tải lên không giới hạn dung lượng.</p>
            </div>
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>

            <ul id="fileList" class="file-list">
                </ul>
        </div>
    </div>

    <div class="section">
        <h2>Mục 2: Nhật Ký Quyết Toán & Thông Tin Thụ Hưởng</h2>
        <div class="grid-2">
            <div class="form-group">
                <label>Số tài khoản hưởng thụ</label>
                <input type="text" id="soTaiKhoan" class="editable-field" disabled>
            </div>
            <div class="form-group">
                <label>Ngân hàng hưởng thụ</label>
                <input type="text" id="nganHang" class="editable-field" disabled>
            </div>
        </div>
        <div class="form-group">
            <label>Đơn vị hưởng thụ (Tên công ty / Cá nhân nhận thanh toán)</label>
            <input type="text" id="donViHuongThu" class="editable-field" disabled>
        </div>

        <div class="btn-group">
            <button type="button" id="btnEdit" class="btn-edit" onclick="kichHoatSua()">✏️ Sửa thông tin</button>
            <button type="button" id="btnSave" class="btn-save" onclick="luuThongTin()">💾 Lưu thay đổi</button>
            <button type="button" id="btnCancel" class="btn-cancel" onclick="huySua()">❌ Hủy</button>
        </div>
    </div>

    <button type="button" id="btnChotQuyetToan" class="btn-chot" onclick="chotQuyetToan()">🔒 XÁC NHẬN CHỐT QUYẾT TOÁN (KHÓA DỮ LIỆU)</button>
</div>

<script>
// ==========================================
// DB GIẢ LẬP TRÊN TRÌNH DUYỆT (LOCALSTORAGE)
// ==========================================
const DEFAULT_DATA = {
    soTaiKhoan: "19034567891011",
    nganHang: "Techcombank - CN Hội Sở",
    donViHuongThu: "Công ty TNHH Giải Pháp Kỹ Thuật Công Nghiệp Toàn Cầu",
    files: [
        { name: "Bien_Ban_Nghiem_Thu_Dinh_Ky.pdf", size: "2.4 MB" },
        { name: "Bang_Ke_Chi_Phi_Vat_Tu.xlsx", size: "1.1 MB" }
    ],
    isLocked: false
};

let appData = JSON.parse(localStorage.getItem('quyetToanDB')) || DEFAULT_DATA;

// Hàm tải dữ liệu lên giao diện
function loadDataToUI() {
    document.getElementById('soTaiKhoan').value = appData.soTaiKhoan;
    document.getElementById('nganHang').value = appData.nganHang;
    document.getElementById('donViHuongThu').value = appData.donViHuongThu;
    
    // Render danh sách file đính kèm
    renderFileList();

    // Xử lý trạng thái nếu đã chốt quyết toán
    if (appData.isLocked) {
        document.getElementById('lockBanner').style.display = 'block';
        document.getElementById('trangThaiHienThi').value = 'Đã chốt quyết toán 🔒';
        document.getElementById('trangThaiHienThi').style.color = '#dc3545';
        document.getElementById('btnEdit').disabled = true;
        document.getElementById('btnChotQuyetToan').disabled = true;
        document.getElementById('btnSelectFile').disabled = true;
    } else {
        document.getElementById('lockBanner').style.display = 'none';
        document.getElementById('trangThaiHienThi').value = 'Chưa chốt (Đang biên tập)';
        document.getElementById('trangThaiHienThi').style.color = '#e67e22';
    }
}

function renderFileList() {
    const fileListEl = document.getElementById('fileList');
    fileListEl.innerHTML = '';
    
    if(appData.files.length === 0) {
        fileListEl.innerHTML = '<li style="color: #888; font-style: italic;">Chưa có file minh chứng nào được đính kèm.</li>';
        return;
    }

    appData.files.forEach((file, index) => {
        const li = document.createElement('li');
        li.className = 'file-item';
        li.innerHTML = `
            <div class="file-info">
                <span>📄</span>
                <strong>${file.name}</strong> <span style="color: #888;">(${file.size})</span>
            </div>
            ${!appData.isLocked ? `<span class="remove-file" onclick="xoaFile(${index})">❌ Xóa</span>` : '<span style="color: green; font-weight:bold;">✓ Đã lưu phiếu</span>'}
        `;
        fileListEl.appendChild(li);
    });
}

// ==========================================
// LOGIC CHỨC NĂNG "SỬA ĐÂU ĐỔI ĐÓ"
// ==========================================
function kichHoatSua() {
    // Mở khóa toàn bộ các trường để chỉnh sửa, GIỮ NGUYÊN giá trị cũ bên trong ô input
    document.querySelectorAll('.editable-field').forEach(field => {
        field.disabled = false;
    });
    document.getElementById('btnEdit').style.display = 'none';
    document.getElementById('btnSave').style.display = 'inline-flex';
    document.getElementById('btnCancel').style.display = 'inline-flex';
}

function luuThongTin() {
    // Chỉ cần bấm lưu, trường nào sửa thì cập nhật trường đó vào database
    appData.soTaiKhoan = document.getElementById('soTaiKhoan').value;
    appData.nganHang = document.getElementById('nganHang').value;
    appData.donViHuongThu = document.getElementById('donViHuongThu').value;
    
    saveToStorage();
    alert("Cập nhật thông tin nhật ký quyết toán thành công!");
    
    // Khóa lại các ô nhập liệu
    huySua();
}

function huySua() {
    document.querySelectorAll('.editable-field').forEach(field => {
        field.disabled = true;
    });
    document.getElementById('btnEdit').style.display = 'inline-flex';
    document.getElementById('btnSave').style.display = 'none';
    document.getElementById('btnCancel').style.display = 'none';
    loadDataToUI(); // Trả lại dữ liệu chuẩn nếu lỡ bấm Hủy
}

// ==========================================
// XỬ LÝ UPLOAD FILE LỚN (GIẢ LẬP CHUNKING PHÍA CLIENT)
// ==========================================
function handleFileSelect(input) {
    if (input.files.length === 0) return;
    
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    progressContainer.style.display = 'block';
    
    let currentProgress = 0;
    // Giả lập cơ chế Chunk Upload cắt nhỏ file truyền tải để không bao giờ bị timeout/giới hạn dung lượng
    const interval = setInterval(() => {
        currentProgress += 10;
        progressBar.style.width = currentProgress + '%';
        progressBar.style.innerText = currentProgress + '%';
        progressBar.textContent = `Đang tải mảnh dữ liệu... ${currentProgress}%`;

        if (currentProgress >= 100) {
            clearInterval(interval);
            
            // Đưa thông tin file đã upload hoàn tất vào danh sách phiếu thanh toán
            for(let i=0; i<input.files.length; i++){
                const file = input.files[i];
                const sizeMB = (file.size / (1024*1024)).toFixed(1) + " MB";
                appData.files.push({ name: file.name, size: sizeMB });
            }
            
            saveToStorage();
            setTimeout(() => {
                progressContainer.style.display = 'none';
                progressBar.style.width = '0%';
                alert("Đã upload file lớn thành công theo cơ chế Chunking và tích hợp thẳng vào phiếu thanh toán!");
                renderFileList();
            }, 400);
        }
    }, 150);
}

function xoaFile(index) {
    if(confirm("Bạn có chắc chắn muốn gỡ bỏ tài liệu đính kèm này?")) {
        appData.files.splice(index, 1);
        saveToStorage();
        renderFileList();
    }
}

// ==========================================
// CHỨC NĂNG CHỐT QUYẾT TOÁN
// ==========================================
function chotQuyetToan() {
    if(confirm("⚠️ CẢNH BÁO: Bạn có chắc chắn muốn chốt quyết toán? Hệ thống sẽ KHÓA CỨNG toàn bộ dữ liệu thông tin hưởng thụ và file đính kèm để đẩy sang bộ phận Kế toán kiểm duyệt, không thể hoàn tác!")) {
        appData.isLocked = true;
        saveToStorage();
        loadDataToUI();
    }
}

function saveToStorage() {
    localStorage.setItem('quyetToanDB', JSON.stringify(appData));
}

// Chạy khởi tạo ứng dụng khi load trang
loadDataToUI();
</script>

</body>
</html>
