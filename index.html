<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ Lý Quản Lý Công Việc & Sức Khỏe</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --bg: #f4f6f9;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .header { background: var(--primary); color: white; text-align: center; padding: 15px 0; font-weight: bold; font-size: 1.3rem; }
        .container { display: flex; max-width: 1200px; margin: 20px auto; padding: 0 15px; gap: 20px; flex-wrap: wrap; }
        .left-col { flex: 1.5; min-width: 350px; }
        .right-col { flex: 1; min-width: 300px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        /* Đồng hồ */
        .timer-display { font-size: 2.5rem; font-weight: bold; color: var(--danger); text-align: center; margin: 10px 0; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-start { background: var(--success); width: 100%; font-size: 1rem; }
        .btn-add { background: #2980b9; }

        /* Form & Bảng */
        .form-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        input, select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; flex: 1; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; font-size: 0.95rem; }
        th { background: #f8f9fa; color: var(--primary); }
        
        /* Trạng thái */
        .status-badge { padding: 3px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; color: white; }
        .status-todo { background: var(--danger); }
        .status-doing { background: var(--warning); }
        .status-done { background: var(--success); }
        
        .action-btns { display: flex; gap: 5px; }
        .btn-sm { padding: 3px 8px; font-size: 0.8rem; border: none; border-radius: 3px; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div class="header">📋 TRỢ LÝ QUẢN LÝ CÔNG VIỆC & CẢNH BÁO SỨC KHỎE</div>

    <div class="container">
        <div class="left-col">
            <div class="card">
                <div class="card-title" style="color: var(--danger);">⏱️ ĐỒNG HỒ SỨC KHỎE (50 PHÚT LÀM - 10 PHÚT NGHỈ)</div>
                <div id="timer-label" style="text-align: center; color: #555;">Trạng thái: Đang dừng</div>
                <div class="timer-display" id="timer-clock">50:00</div>
                <button class="btn btn-start" id="btn-timer" onclick="toggleTimer()">Bắt đầu ngày làm việc</button>
            </div>

            <div class="card">
                <div class="card-title" style="color: #2980b9;">📋 DANH SÁCH NHIỆM VỤ TRONG NGÀY</div>
                <div class="form-group">
                    <input type="text" id="task-name" placeholder="Nhập tên công việc...">
                    <select id="task-priority">
                        <option>Khẩn cấp - Quan trọng</option>
                        <option>Không khẩn cấp - Quan trọng</option>
                        <option>Khẩn cấp - Không quan trọng</option>
                        <option>Hàng ngày/Khác</option>
                    </select>
                    <button class="btn btn-add" onclick="addTask()">Thêm việc</button>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Công việc</th>
                                <th>Độ ưu tiên</th>
                                <th>Trạng thái</th>
                                font-weight: bold;
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="task-list">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="card" style="position: sticky; top: 20px;">
                <div class="card-title" style="color: var(--primary);">📊 BIỂU ĐỒ HIỆU SUẤT TRỰC QUAN</div>
                <div style="max-width: 280px; margin: 0 auto;">
                    <canvas id="efficiencyChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Khởi tạo dữ liệu
        let tasks = [
            { id: 1, name: "Xử lý văn bản, tờ trình hành chính", priority: "Khẩn cấp - Quan trọng", status: "Đang làm" },
            { id: 2, name: "Kiểm tra kết nối hệ thống phần mềm", priority: "Khẩn cấp - Không quan trọng", status: "Hoàn thành" },
            { id: 3, name: "Cập nhật dữ liệu báo cáo vận hành", priority: "Không khẩn cấp - Quan trọng", status: "Chưa làm" }
        ];

        // Cấu hình thời gian (50 phút làm, 10 phút nghỉ)
        let workTime = 50 * 60;
        let breakTime = 10 * 60;
        let timeLeft = workTime;
        let isWorking = true;
        let timerInterval = null;
        let chart = null;

        // Chạy khi trang web tải xong
        window.onload = function() {
            renderTasks();
            initChart();
        };

        function renderTasks() {
            const tbody = document.getElementById("task-list");
            tbody.innerHTML = "";
            tasks.forEach(task => {
                let statusClass = "status-todo";
                if(task.status === "Đang làm") statusClass = "status-doing";
                if(task.status === "Hoàn thành") statusClass = "status-done";

                tbody.innerHTML += `
                    <tr>
                        <td><strong>${task.name}</strong></td>
                        <td><small>${task.priority}</small></td>
                        <td><span class="status-badge ${statusClass}">${task.status}</span></td>
                        <td class="action-btns">
                            <button class="btn-sm" style="background:var(--warning)" onclick="changeStatus(${task.id}, 'Đang làm')">⏳</button>
                            <button class="btn-sm" style="background:var(--success)" onclick="changeStatus(${task.id}, 'Hoàn thành')">✔</button>
                            <button class="btn-sm" style="background:var(--danger)" onclick="deleteTask(${task.id})">❌</button>
                        </td>
                    </tr>
                `;
            });
            updateChart();
        }

        function addTask() {
            const name = document.getElementById("task-name").value;
            const priority = document.getElementById("task-priority").value;
            if(!name) return alert("Vui lòng nhập tên công việc!");
            
            tasks.push({ id: Date.now(), name, priority, status: "Chưa làm" });
            document.getElementById("task-name").value = "";
            renderTasks();
        }

        function changeStatus(id, newStatus) {
            tasks = tasks.map(t => t.id === id ? {...t, status: newStatus} : t);
            renderTasks();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            renderTasks();
        }

        // Quản lý đồng hồ và Cảnh báo
        function toggleTimer() {
            const btn = document.getElementById("btn-timer");
            const label = document.getElementById("timer-label");
            
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                btn.innerText = "Tiếp tục làm việc";
                btn.style.background = var(--success);
                label.innerText = "Trạng thái: Đang tạm dừng";
            } else {
                btn.innerText = "Tạm dừng nghỉ ngơi";
                btn.style.background = var(--warning);
                label.innerText = isWorking ? "Trạng thái: 💻 Tập trung làm việc" : "Trạng thái: ☕ Nghỉ ngơi thư giãn";
                
                timerInterval = setInterval(() => {
                    timeLeft--;
                    let mins = Math.floor(timeLeft / 60);
                    let secs = timeLeft % 60;
                    document.getElementById("timer-clock").innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        if (isWorking) {
                            alert("🔔 CẢNH BÁO SỨC KHỎE:\nĐã hết 50 phút làm việc! Bạn hãy đứng dậy vươn vai, rời mắt khỏi màn hình và uống nước trong 10 phút nhé.");
                            isWorking = false;
                            timeLeft = breakTime;
                            document.getElementById("timer-clock").style.color = "var(--success)";
                        } else {
                            alert("💻 QUAY LẠI LÀM VIỆC:\nHết thời gian nghỉ ngơi. Hãy quay lại giải quyết công việc với năng lượng cao nhất!");
                            isWorking = true;
                            timeLeft = workTime;
                            document.getElementById("timer-clock").style.color = "var(--danger)";
                        }
                        toggleTimer();
                    }
                }, 1000);
            }
        }

        // Quản lý Biểu đồ Trực quan
        function initChart() {
            const ctx = document.getElementById('efficiencyChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Chưa làm', 'Đang làm', 'Hoàn thành'],
                    datasets: [{ data: [0, 0, 0], backgroundColor: ['#e74c3c', '#f39c12', '#2ecc71'] }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        }

        function updateChart() {
            if(!chart) return;
            let todo = tasks.filter(t => t.status === "Chưa làm").length;
            let doing = tasks.filter(t => t.status === "Đang làm").length;
            let done = tasks.filter(t => t.status === "Hoàn thành").length;
            
            chart.data.datasets[0].data = [todo, doing, done];
            chart.update();
        }
    </script>
</body>
</html>
